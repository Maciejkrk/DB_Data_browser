<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DB Data Browser</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --line: #d7dee8;
      --text: #172033;
      --muted: #667085;
      --accent: #0f766e;
      --accent-soft: #e6fffb;
      --ink-soft: #f8fafc;
      --danger: #9a3412;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    h1 { margin: 0; font-size: 20px; }
    h2 { margin: 0 0 10px; font-size: 16px; }
    main {
      display: grid;
      grid-template-columns: minmax(320px, 430px) 1fr;
      gap: 14px;
      padding: 14px;
      min-height: calc(100vh - 58px);
    }
    aside, section {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      overflow: hidden;
    }
    .toolbar {
      display: grid;
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: var(--ink-soft);
    }
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
    }
    button {
      border: 0;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .tabs button {
      padding: 10px;
      border-right: 1px solid var(--line);
    }
    .tabs button:last-child { border-right: 0; }
    .tabs button.active {
      background: var(--accent);
      color: #fff;
    }
    input, select {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
      font: inherit;
    }
    .list {
      max-height: calc(100vh - 204px);
      overflow: auto;
    }
    .item {
      width: 100%;
      display: block;
      padding: 12px;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: #fff;
      text-align: left;
    }
    .item:hover, .item.active { background: var(--accent-soft); }
    .item-title { display: block; font-weight: 800; }
    .item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .content {
      padding: 14px;
      max-height: calc(100vh - 88px);
      overflow: auto;
    }
    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .pill {
      display: inline-block;
      padding: 4px 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #344054;
      font-size: 12px;
    }
    .detail-head {
      display: grid;
      gap: 8px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 10px;
    }
    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      margin: 12px 0;
    }
    .media-card {
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
    }
    .media-card img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      background: var(--ink-soft);
    }
    .media-card a {
      display: block;
      padding: 8px;
      color: var(--text);
      font-weight: 700;
      overflow-wrap: anywhere;
    }
    .field, details {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      overflow: hidden;
    }
    .field {
      padding: 9px 10px;
    }
    .field-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .field-value {
      margin-top: 4px;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
      line-height: 1.4;
    }
    details { margin-top: 12px; }
    summary {
      padding: 11px 12px;
      background: var(--ink-soft);
      cursor: pointer;
      font-weight: 800;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 8px;
      border-top: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    th {
      color: #344054;
      background: #fff;
      font-size: 12px;
    }
    td {
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }
    .data-table {
      margin: 12px 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: auto;
      background: #fff;
    }
    .data-table table { min-width: 620px; }
    .data-table th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--ink-soft);
    }
    .system-variant {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
    }
    .system-variant h3 {
      margin: 0;
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--ink-soft);
      font-size: 15px;
    }
    .product-choice {
      display: grid;
      gap: 4px;
    }
    .product-choice select {
      max-width: 360px;
      margin: 0;
    }
    .product-chip {
      display: inline-block;
      margin: 2px 4px 2px 0;
      padding: 3px 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--ink-soft);
      font-size: 12px;
    }
    .muted { color: var(--muted); }
    .warn { color: var(--danger); }
    .import-panel {
      display: grid;
      gap: 12px;
      max-width: 900px;
    }
    .import-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap: 8px;
    }
    .import-file {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
    }
    .import-file strong { overflow-wrap: anywhere; }
    .import-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .import-actions button {
      width: auto;
      padding: 10px 14px;
      border-radius: 4px;
      background: var(--accent);
      color: #fff;
    }
    @media (max-width: 940px) {
      main { grid-template-columns: 1fr; }
      .list, .content { max-height: none; }
      .grid { grid-template-columns: 1fr; }
      .import-list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>DB Data Browser</h1>
    <div id="summary" class="summary">Ładowanie danych...</div>
  </header>
  <main>
    <aside>
      <div class="toolbar">
        <div class="tabs">
          <button id="productsTab" class="active" type="button">Produkty</button>
          <button id="systemsTab" type="button">Systemy</button>
        </div>
        <input id="searchInput" type="search" placeholder="Szukaj po nazwie, kategorii, typie...">
        <select id="categorySelect"></select>
      </div>
      <div id="list" class="list"></div>
    </aside>
    <section>
      <div id="detail" class="content">
        <div class="muted">Wybierz rekord z listy po lewej stronie.</div>
      </div>
    </section>
  </main>
  <script>
    const state = { mode: "products", items: [], selectedId: null, categories: [] };
    const REQUIRED_FILES = [
      "productsModels.json",
      "productsAttributes.json",
      "products.json",
      "buildingsElementsModels.json",
      "buildingsElementsAttributes.json",
      "building_elements.json",
      "colors.json",
      "colorParameters.json",
      "colorGroups.json",
      "colorGroupParameters.json",
    ];
    const $ = (id) => document.getElementById(id);
    const esc = (value) => String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");

    async function api(path) {
      const response = await fetch(path);
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || "Błąd odczytu danych");
      return data;
    }

    function setMode(mode) {
      state.mode = mode;
      state.selectedId = null;
      $("productsTab").classList.toggle("active", mode === "products");
      $("systemsTab").classList.toggle("active", mode === "systems");
      $("categorySelect").hidden = mode !== "products";
      $("searchInput").value = "";
      loadList();
    }

    async function loadSourceStatus() {
      const status = await api("/api/source/status");
      if (!status.ready) {
        renderImport(status);
        return false;
      }
      return true;
    }

    function renderImport(status) {
      $("summary").innerHTML = `
        <span class="pill">Źródło danych nie jest jeszcze wczytane</span>
        <span class="pill">${esc(status.data_dir)}</span>
      `;
      $("list").innerHTML = "";
      $("detail").innerHTML = `
        <div class="import-panel">
          <h2>Import danych PIM</h2>
          <div class="muted">Wgraj pliki JSON z eksportu PIM. Pliki możesz zaznaczyć wszystkie naraz albo dodawać po kolei.</div>
          <div class="import-list">
            ${(status.files || []).map((file) => `
              <div class="import-file">
                <strong>${esc(file.name)}</strong>
                <span class="${file.exists ? "" : "warn"}">${file.exists ? `OK (${Math.round(file.size / 1024)} KB)` : "brak"}</span>
              </div>
            `).join("")}
          </div>
          <div class="import-actions">
            <input id="sourceFilesInput" type="file" accept=".json" multiple>
            <button id="uploadSourceFilesBtn" type="button">Wgraj pliki</button>
          </div>
          <div id="uploadStatus" class="muted">Do działania przeglądarki wymagane są co najmniej: ${esc((status.missing_core || []).join(", ") || "komplet podstawowy jest gotowy")}.</div>
        </div>
      `;
      $("uploadSourceFilesBtn").addEventListener("click", uploadSourceFiles);
    }

    async function uploadSourceFiles() {
      const input = $("sourceFilesInput");
      const status = $("uploadStatus");
      if (!input.files.length) {
        status.textContent = "Wybierz pliki JSON do wgrania.";
        return;
      }
      const body = new FormData();
      for (const file of input.files) {
        body.append("files", file, file.name);
      }
      status.textContent = "Wgrywanie plików...";
      const response = await fetch("/api/source/upload", { method: "POST", body });
      const data = await response.json();
      if (!response.ok) {
        status.textContent = data.error || "Nie udało się wgrać plików.";
        return;
      }
      if (data.ready) {
        await startApp();
      } else {
        renderImport(data);
      }
    }

    async function loadSummary() {
      const summary = await api("/api/summary");
      $("summary").innerHTML = `
        <span class="pill">Produkty: ${esc(summary.products)}</span>
        <span class="pill">Systemy: ${esc(summary.systems)}</span>
        <span class="pill">Źródło: ${esc(summary.data_dir)}</span>
      `;
    }

    async function loadList() {
      const query = encodeURIComponent($("searchInput").value.trim());
      const category = encodeURIComponent($("categorySelect").value || "");
      const url = state.mode === "products"
        ? `/api/products?q=${query}&category=${category}`
        : `/api/systems?q=${query}`;
      const data = await api(url);
      state.items = data.items || [];
      if (state.mode === "products") {
        state.categories = data.categories || [];
        renderCategories();
      }
      renderList();
      $("detail").innerHTML = `<div class="muted">Znaleziono ${state.items.length} rekordów. Wybierz pozycję z listy.</div>`;
    }

    function renderCategories() {
      const current = $("categorySelect").value;
      $("categorySelect").innerHTML = `<option value="">Wszystkie kategorie</option>` +
        state.categories.map((item) => `<option value="${esc(item)}">${esc(item)}</option>`).join("");
      $("categorySelect").value = current;
    }

    function renderList() {
      $("list").innerHTML = state.items.map((item) => {
        const meta = state.mode === "products"
          ? [item.unit ? `jedn.: ${item.unit}` : "", ...(item.categories || []).slice(0, 3)]
          : [item.type, item.insulation, item.bim_type];
        return `<button class="item${item.id === state.selectedId ? " active" : ""}" type="button" data-id="${esc(item.id)}">
          <span class="item-title">${esc(item.name)}</span>
          <span class="item-meta">${meta.filter(Boolean).map((value) => `<span>${esc(value)}</span>`).join("")}</span>
        </button>`;
      }).join("") || `<div class="item"><span class="muted">Brak wyników.</span></div>`;
      for (const button of document.querySelectorAll(".item[data-id]")) {
        button.addEventListener("click", () => loadDetail(Number(button.dataset.id)));
      }
    }

    async function loadDetail(id) {
      state.selectedId = id;
      renderList();
      const data = await api(state.mode === "products" ? `/api/products/${id}` : `/api/systems/${id}`);
      $("detail").innerHTML = state.mode === "products" ? renderProduct(data) : renderSystem(data);
    }

    function renderProduct(data) {
      return `
        <div class="detail-head">
          <h2>${esc(data.name)}</h2>
          <div class="summary">
            <span class="pill">ID: ${esc(data.id)}</span>
            <span class="pill">Atrybuty: ${esc(data.attribute_count)}</span>
            ${data.unit ? `<span class="pill">Jednostka: ${esc(data.unit)}</span>` : ""}
            ${(data.categories || []).map((item) => `<span class="pill">${esc(item)}</span>`).join("")}
          </div>
        </div>
        ${mediaGrid(data.media)}
        ${featureTable(data.features)}
        ${tableBlock("Typoszereg / SOT", data.sot_table)}
        ${fieldGrid(data.general)}
        ${infoRows("Informacje produktowe", data.product_information)}
        ${tableBlock("Opakowania", data.package_table)}
        ${tableBlock("Palety", data.palette_table)}
        ${tableBlock("Warianty produktu", data.variant_table)}
        ${tableBlock("Dokumenty", data.document_table)}
        ${section("Surowe cechy własne", data.custom_attributes)}
      `;
    }

    function renderSystem(data) {
      return `
        <div class="detail-head">
          <h2>${esc(data.name)}</h2>
          <div class="summary">
            <span class="pill">ID: ${esc(data.id)}</span>
            <span class="pill">Atrybuty: ${esc(data.attribute_count)}</span>
            ${data.type ? `<span class="pill">${esc(data.type)}</span>` : ""}
            ${data.insulation ? `<span class="pill">${esc(data.insulation)}</span>` : ""}
            ${data.bim_type ? `<span class="pill">BIM: ${esc(data.bim_type)}</span>` : ""}
          </div>
        </div>
        ${mediaGrid(data.media)}
        ${fieldGrid(data.general)}
        ${systemVariants(data.system_variants)}
        ${filesSection(data.files || [])}
      `;
    }

    function mediaGrid(items) {
      if (!items || !items.length) return "";
      return `<div class="media-grid">${items.map((item) => `
        <div class="media-card">
          ${item.kind === "image" ? `<img src="${esc(item.url)}" alt="${esc(item.name)}">` : ""}
          <a href="${esc(item.url)}" target="_blank" rel="noreferrer">${esc(item.name || item.url)}</a>
        </div>
      `).join("")}</div>`;
    }

    function featureTable(features) {
      if (!features || !features.length) return "";
      return `<div class="data-table">
        <table>
          <thead><tr><th>Cecha</th><th>Wartość</th><th>Prefiks</th><th>Sufiks / jednostka</th></tr></thead>
          <tbody>${features.map((item) => `
            <tr>
              <td><strong>${esc(item.name)}</strong></td>
              <td>${esc(item.value)}</td>
              <td>${esc(item.prefix || "")}</td>
              <td>${esc(item.suffix || "")}</td>
            </tr>
          `).join("")}</tbody>
        </table>
      </div>`;
    }

    function tableBlock(title, table) {
      if (!table || !table.rows || !table.rows.length) return "";
      return `<details open>
        <summary>${esc(title)} (${table.rows.length})</summary>
        <div class="data-table">
          <table>
            <thead><tr><th>Wiersz</th>${table.columns.map((column) => `<th>${esc(column.label)}</th>`).join("")}</tr></thead>
            <tbody>${table.rows.map((row) => `
              <tr>
                <td>${esc(row.row)}</td>
                ${table.columns.map((column) => `<td>${esc(row.values[column.key] ?? "")}</td>`).join("")}
              </tr>
            `).join("")}</tbody>
          </table>
        </div>
      </details>`;
    }

    function infoRows(title, rows) {
      if (!rows || !rows.length) return "";
      return `<details>
        <summary>${esc(title)} (${rows.length})</summary>
        <div class="grid">
          ${rows.flatMap((row) => row.values || []).filter((item) => item.value !== true).map((item) => `
            <div class="field">
              <div class="field-label">${esc(item.label)}</div>
              <div class="field-value">${esc(item.value)}</div>
            </div>
          `).join("")}
        </div>
      </details>`;
    }

    function systemVariants(variants) {
      if (!variants || !variants.length) return "";
      return variants.map((variant) => `
        <div class="system-variant">
          <h3>${esc(variant.name)}</h3>
          <div class="data-table">
            <table>
              <thead><tr><th>Pozycja</th><th>Warstwa</th><th>Produkt / wariant</th></tr></thead>
              <tbody>${(variant.layers || []).map((layer) => `
                <tr>
                  <td>${esc(layer.position || layer.row)}</td>
                  <td><strong>${esc(layer.name)}</strong></td>
                  <td>${productSelector(layer.products || [])}</td>
                </tr>
              `).join("")}</tbody>
            </table>
          </div>
        </div>
      `).join("");
    }

    function productSelector(products) {
      if (!products.length) return `<span class="muted">Brak przypisanych produktów</span>`;
      const options = products.map((item, index) => {
        const label = `${item.product_name || item.product_id}${item.variant ? ` / wariant ${item.variant}` : ""}${item.default ? " / domyślny" : ""}`;
        return `<option value="${index}">${esc(label)}</option>`;
      }).join("");
      const chips = products.map((item) => `
        <span class="product-chip">${esc(item.product_name || item.product_id)}${item.variant ? `, wariant ${esc(item.variant)}` : ""}</span>
      `).join("");
      return `<div class="product-choice"><select>${options}</select><div>${chips}</div></div>`;
    }

    function fieldGrid(items) {
      return `<div class="grid">${(items || []).map((item) => `
        <div class="field">
          <div class="field-label">${esc(item.label)}</div>
          <div class="field-value">${esc(item.value)}</div>
        </div>
      `).join("")}</div>`;
    }

    function section(title, rows) {
      if (!rows || !rows.length) return "";
      return `<details open>
        <summary>${esc(title)} (${rows.length})</summary>
        <table>
          <thead><tr><th>Wiersz</th><th>Pola</th></tr></thead>
          <tbody>${rows.map((row) => `
            <tr>
              <td>${esc(row.row)}</td>
              <td>${row.values.map((item) => `<strong>${esc(item.label)}:</strong> ${esc(item.value)}`).join("<br>")}</td>
            </tr>
          `).join("")}</tbody>
        </table>
      </details>`;
    }

    function filesSection(files) {
      if (!files.length) return "";
      return `<details open>
        <summary>Pliki (${files.length})</summary>
        <table>
          <thead><tr><th>Nazwa</th><th>Adres</th></tr></thead>
          <tbody>${files.map((file) => `
            <tr>
              <td>${esc(file.uploadedfileName || file.fileName || file.AttributeId)}</td>
              <td><a href="${esc(file.fileUrl)}" target="_blank" rel="noreferrer">${esc(file.fileUrl)}</a></td>
            </tr>
          `).join("")}</tbody>
        </table>
      </details>`;
    }

    $("productsTab").addEventListener("click", () => setMode("products"));
    $("systemsTab").addEventListener("click", () => setMode("systems"));
    $("searchInput").addEventListener("input", () => loadList());
    $("categorySelect").addEventListener("change", () => loadList());

    async function startApp() {
      const ready = await loadSourceStatus();
      if (!ready) return;
      await loadSummary();
      await loadList();
    }

    startApp()
      .catch((error) => {
        $("summary").innerHTML = `<span class="warn">${esc(error.message)}</span>`;
        $("detail").innerHTML = `<div class="warn">${esc(error.message)}</div>`;
      });
  </script>
</body>
</html>
