<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DB Data Browser</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --line: #d7dee8;
      --text: #172033;
      --muted: #667085;
      --accent: #0f766e;
      --accent-soft: #e6fffb;
      --ink-soft: #f8fafc;
      --danger: #9a3412;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    h1 { margin: 0; font-size: 20px; }
    h2 { margin: 0 0 10px; font-size: 16px; }
    main {
      display: grid;
      grid-template-columns: minmax(320px, 430px) 1fr;
      gap: 14px;
      padding: 14px;
      min-height: calc(100vh - 58px);
    }
    aside, section {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      overflow: hidden;
    }
    .toolbar {
      display: grid;
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: var(--ink-soft);
    }
    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
    }
    button {
      border: 0;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .tabs button {
      padding: 10px;
      border-right: 1px solid var(--line);
    }
    .tabs button:last-child { border-right: 0; }
    .tabs button.active {
      background: var(--accent);
      color: #fff;
    }
    input, select {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
      font: inherit;
    }
    .list {
      max-height: calc(100vh - 204px);
      overflow: auto;
    }
    .filters {
      display: grid;
      gap: 12px;
      max-height: calc(100vh - 204px);
      overflow: auto;
      padding: 12px;
    }
    .filter-group {
      display: grid;
      gap: 7px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }
    .filter-title {
      font-weight: 800;
      line-height: 1.3;
    }
    .filter-option {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 7px;
      align-items: start;
      color: #344054;
      line-height: 1.35;
    }
    .filter-option input {
      width: auto;
      margin: 2px 0 0;
      padding: 0;
    }
    .filter-count {
      color: var(--muted);
      font-size: 12px;
    }
    .clear-filters {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--ink-soft);
      color: var(--text);
    }
    .item {
      width: 100%;
      display: block;
      padding: 12px;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: #fff;
      text-align: left;
    }
    .item:hover, .item.active { background: var(--accent-soft); }
    .item-title { display: block; font-weight: 800; }
    .item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .content {
      padding: 14px;
      max-height: calc(100vh - 88px);
      overflow: auto;
    }
    .results-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 12px;
    }
    .result-card {
      display: grid;
      gap: 8px;
      width: 100%;
      min-height: 170px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
      text-align: left;
      color: var(--text);
    }
    .result-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 14px rgba(15, 23, 42, .12);
    }
    .result-card img,
    .result-card .result-placeholder {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      background: var(--ink-soft);
    }
    .result-placeholder {
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 28px;
    }
    .result-title {
      padding: 0 10px 10px;
      font-weight: 800;
      line-height: 1.35;
    }
    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .pill {
      display: inline-block;
      padding: 4px 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #344054;
      font-size: 12px;
    }
    .detail-head {
      display: grid;
      gap: 8px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 10px;
    }
    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      margin: 12px 0;
    }
    .media-card {
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
    }
    .media-card img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      background: var(--ink-soft);
    }
    .media-card a {
      display: block;
      padding: 8px;
      color: var(--text);
      font-weight: 700;
      overflow-wrap: anywhere;
    }
    .swatch {
      width: 100%;
      aspect-ratio: 4 / 3;
      display: block;
      background:
        linear-gradient(45deg, #d0d5dd 25%, transparent 25%),
        linear-gradient(-45deg, #d0d5dd 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #d0d5dd 75%),
        linear-gradient(-45deg, transparent 75%, #d0d5dd 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
    }
    .source-button {
      padding: 8px 10px;
      border-radius: 4px;
      background: var(--ink-soft);
      border: 1px solid var(--line);
      color: var(--text);
    }
    .field, details {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      overflow: hidden;
    }
    .field {
      padding: 9px 10px;
    }
    .field-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .field-value {
      margin-top: 4px;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
      line-height: 1.4;
    }
    details { margin-top: 12px; }
    summary {
      padding: 11px 12px;
      background: var(--ink-soft);
      cursor: pointer;
      font-weight: 800;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 8px;
      border-top: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    th {
      color: #344054;
      background: #fff;
      font-size: 12px;
    }
    td {
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }
    .data-table {
      margin: 12px 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: auto;
      background: #fff;
    }
    .data-table table { min-width: 620px; }
    .data-table th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--ink-soft);
    }
    .system-variant {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
    }
    .system-variant h3 {
      margin: 0;
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--ink-soft);
      font-size: 15px;
    }
    .product-choice {
      display: grid;
      gap: 4px;
    }
    .product-choice select {
      max-width: 360px;
      margin: 0;
    }
    .product-chip {
      display: inline-block;
      margin: 2px 4px 2px 0;
      padding: 3px 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--ink-soft);
      font-size: 12px;
    }
    .color-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 12px;
    }
    .color-tile {
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
      text-align: left;
    }
    .color-tile:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 14px rgba(15, 23, 42, .12);
    }
    .color-tile button {
      width: 100%;
      display: block;
      padding: 0;
      text-align: left;
      background: #fff;
      color: var(--text);
      font-weight: 400;
    }
    .color-tile img,
    .color-tile .swatch {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
    }
    .color-tile-body {
      padding: 9px;
    }
    .relation-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .relation-item {
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--ink-soft);
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(15, 23, 42, .48);
      z-index: 20;
    }
    .modal-backdrop[hidden] { display: none; }
    .modal {
      width: min(1040px, 96vw);
      max-height: 92vh;
      overflow: auto;
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 18px 60px rgba(15, 23, 42, .28);
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--ink-soft);
    }
    .modal-head h2 { margin: 0; }
    .modal-close {
      width: auto;
      padding: 8px 10px;
      border-radius: 4px;
      background: var(--accent);
      color: #fff;
    }
    .modal-body { padding: 14px; }
    .muted { color: var(--muted); }
    .warn { color: var(--danger); }
    .import-panel {
      display: grid;
      gap: 12px;
      max-width: 900px;
    }
    .import-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap: 8px;
    }
    .import-file {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
    }
    .import-file strong { overflow-wrap: anywhere; }
    .import-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .import-actions button {
      width: auto;
      padding: 10px 14px;
      border-radius: 4px;
      background: var(--accent);
      color: #fff;
    }
    @media (max-width: 940px) {
      main { grid-template-columns: 1fr; }
      .list, .content { max-height: none; }
      .filters { max-height: none; }
      .grid { grid-template-columns: 1fr; }
      .import-list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>DB Data Browser</h1>
    <div id="summary" class="summary">Loading data...</div>
    <button id="changeSourceBtn" class="source-button" type="button">Change source files</button>
  </header>
  <main>
    <aside>
      <div class="toolbar">
        <div class="tabs">
          <button id="productsTab" class="active" type="button">Products</button>
          <button id="systemsTab" type="button">Systems</button>
          <button id="colorsTab" type="button">Colors</button>
        </div>
        <input id="searchInput" type="search" placeholder="Search by name, category, type...">
        <select id="categorySelect" hidden></select>
      </div>
      <div id="list" class="list"></div>
    </aside>
    <section>
      <div id="detail" class="content">
        <div class="muted">Select a record from the list on the left.</div>
      </div>
    </section>
  </main>
  <div id="modalBackdrop" class="modal-backdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h2 id="modalTitle">Details</h2>
        <button id="modalCloseBtn" class="modal-close" type="button">Close</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>
  <script>
    const state = { mode: "products", items: [], selectedId: null, filters: { products: {}, systems: {}, colors: {} }, filterDefs: [] };
    const REQUIRED_FILES = [
      "productsModels.json",
      "productsAttributes.json",
      "products.json",
      "buildingsElementsModels.json",
      "buildingsElementsAttributes.json",
      "building_elements.json",
      "colors.json",
      "colorParameters.json",
      "colorGroups.json",
      "colorGroupParameters.json",
    ];
    const $ = (id) => document.getElementById(id);
    const esc = (value) => String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");

    async function api(path) {
      const response = await fetch(path);
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || "Data read error");
      return data;
    }

    function setMode(mode) {
      state.mode = mode;
      state.selectedId = null;
      $("productsTab").classList.toggle("active", mode === "products");
      $("systemsTab").classList.toggle("active", mode === "systems");
      $("colorsTab").classList.toggle("active", mode === "colors");
      $("categorySelect").hidden = mode !== "colors";
      $("searchInput").value = "";
      renderFilterOptions();
      loadList();
    }

    async function loadSourceStatus() {
      const status = await api("/api/source/status");
      if (!status.ready) {
        renderImport(status);
        return false;
      }
      return true;
    }

    function renderImport(status) {
      $("summary").innerHTML = `
        <span class="pill">Data source is not loaded yet</span>
        <span class="pill">${esc(status.data_dir)}</span>
      `;
      $("list").innerHTML = "";
      $("detail").innerHTML = `
        <div class="import-panel">
          <h2>PIM Data Import</h2>
          <div class="muted">Upload JSON files exported from PIM. You can select all files at once or add them one by one.</div>
          <div class="import-list">
            ${(status.files || []).map((file) => `
              <div class="import-file">
                <strong>${esc(file.name)}</strong>
                <span class="${file.exists ? "" : "warn"}">${file.exists ? `OK (${Math.round(file.size / 1024)} KB)` : "missing"}</span>
              </div>
            `).join("")}
          </div>
          <div class="import-actions">
            <input id="sourceFilesInput" type="file" accept=".json" multiple>
            <button id="uploadSourceFilesBtn" type="button">Upload files</button>
          </div>
          <div id="uploadStatus" class="muted">Required core files: ${esc((status.missing_core || []).join(", ") || "core file set is ready")}.</div>
        </div>
      `;
      $("uploadSourceFilesBtn").addEventListener("click", uploadSourceFiles);
    }

    async function changeSourceFiles() {
      const ok = window.confirm("Clear the currently uploaded source files and import a new JSON set?");
      if (!ok) return;
      const response = await fetch("/api/source/clear", { method: "POST" });
      const data = await response.json();
      if (!response.ok) {
        $("detail").innerHTML = `<div class="warn">${esc(data.error || "Could not clear source files.")}</div>`;
        return;
      }
      state.items = [];
      state.selectedId = null;
      renderImport(data);
    }

    async function uploadSourceFiles() {
      const input = $("sourceFilesInput");
      const status = $("uploadStatus");
      if (!input.files.length) {
        status.textContent = "Select JSON files to upload.";
        return;
      }
      const body = new FormData();
      for (const file of input.files) {
        body.append("files", file, file.name);
      }
      status.textContent = "Uploading files...";
      const response = await fetch("/api/source/upload", { method: "POST", body });
      const data = await response.json();
      if (!response.ok) {
        status.textContent = data.error || "Could not upload files.";
        return;
      }
      if (data.ready) {
        await startApp();
      } else {
        renderImport(data);
      }
    }

    async function loadSummary() {
      const summary = await api("/api/summary");
      $("summary").innerHTML = `
        <span class="pill">Products: ${esc(summary.products)}</span>
        <span class="pill">Systems: ${esc(summary.systems)}</span>
        <span class="pill">Colors/textures: ${esc(summary.colors || 0)}</span>
        <span class="pill">Source: ${esc(summary.data_dir)}</span>
      `;
    }

    async function loadList() {
      const query = encodeURIComponent($("searchInput").value.trim());
      const params = new URLSearchParams();
      if (query) params.set("q", $("searchInput").value.trim());
      for (const [key, values] of Object.entries(state.filters[state.mode] || {})) {
        for (const value of values || []) {
          params.append(`f_${key}`, value);
        }
      }
      const suffix = params.toString() ? `?${params.toString()}` : "";
      const url = state.mode === "products"
        ? `/api/products${suffix}`
        : state.mode === "colors"
          ? `/api/color-groups`
          : `/api/systems${suffix}`;
      const data = await api(url);
      state.items = state.mode === "colors"
        ? (data.items || []).filter((item) => !query || `${item.name} ${item.description || ""}`.toLowerCase().includes(decodeURIComponent(query).toLowerCase()))
        : data.items || [];
      state.filterDefs = data.filters || [];
      renderFilterOptions();
      if (state.mode === "colors") {
        renderList();
        $("detail").innerHTML = `<div class="muted">Select a color group from the list on the left.</div>`;
      } else {
        renderFilters();
        renderResults();
      }
    }

    function renderFilterOptions() {
      const current = $("categorySelect").value;
      if (state.mode === "colors") {
        $("categorySelect").innerHTML = `
          <option value="">All items in group</option>
          <option value="simple">Colors only</option>
          <option value="advanced">Textures only</option>
        `;
      }
      $("categorySelect").value = current;
    }

    function renderFilters() {
      const filters = state.filterDefs || [];
      const selected = state.filters[state.mode] || {};
      $("list").innerHTML = `
        <div class="filters">
          <button class="clear-filters" type="button" data-clear-filters>Clear filters</button>
          ${filters.map((filter) => `
            <div class="filter-group">
              <div class="filter-title">${esc(filter.label)}</div>
              ${filter.type === "single" ? singleFilter(filter, selected[filter.id] || []) : multiFilter(filter, selected[filter.id] || [])}
            </div>
          `).join("") || `<div class="muted">No selection filters found in this dataset.</div>`}
        </div>
      `;
      const clearButton = document.querySelector("[data-clear-filters]");
      if (clearButton) {
        clearButton.addEventListener("click", () => {
          state.filters[state.mode] = {};
          loadList();
        });
      }
      for (const input of document.querySelectorAll("[data-filter-id]")) {
        input.addEventListener("change", () => updateFilter(input));
      }
    }

    function singleFilter(filter, selected) {
      const current = selected[0] || "";
      return `<select data-filter-id="${esc(filter.id)}" data-filter-type="single">
        <option value="">Any</option>
        ${(filter.values || []).map((item) => `<option value="${esc(item.value)}"${item.value === current ? " selected" : ""}>${esc(item.value)} (${esc(item.count)})</option>`).join("")}
      </select>`;
    }

    function multiFilter(filter, selected) {
      const current = new Set(selected || []);
      return (filter.values || []).map((item) => `
        <label class="filter-option">
          <input type="checkbox" data-filter-id="${esc(filter.id)}" data-filter-type="multi" value="${esc(item.value)}"${current.has(item.value) ? " checked" : ""}>
          <span>${esc(item.value)} <span class="filter-count">(${esc(item.count)})</span></span>
        </label>
      `).join("");
    }

    function updateFilter(input) {
      const modeFilters = state.filters[state.mode] || {};
      const id = input.dataset.filterId;
      if (input.dataset.filterType === "single") {
        modeFilters[id] = input.value ? [input.value] : [];
      } else {
        modeFilters[id] = [...document.querySelectorAll("[data-filter-id]:checked")]
          .filter((item) => item.dataset.filterId === id)
          .map((item) => item.value);
      }
      if (!modeFilters[id].length) delete modeFilters[id];
      state.filters[state.mode] = modeFilters;
      loadList();
    }

    function renderResults() {
      const label = state.mode === "products" ? "products" : "systems";
      $("detail").innerHTML = `
        <div class="results-head">
          <h2>${state.items.length} ${label}</h2>
        </div>
        <div class="results-grid">
          ${state.items.map((item) => `
            <button class="result-card" type="button" data-result-id="${esc(item.id)}">
              ${item.thumbnail ? `<img src="${esc(item.thumbnail)}" alt="${esc(item.name)}">` : `<span class="result-placeholder">${state.mode === "products" ? "P" : "S"}</span>`}
              <span class="result-title">${esc(item.name)}</span>
            </button>
          `).join("") || `<div class="muted">No results.</div>`}
        </div>
      `;
      for (const button of document.querySelectorAll("[data-result-id]")) {
        button.addEventListener("click", () => loadDetail(Number(button.dataset.resultId)));
      }
    }

    function renderList() {
      $("list").innerHTML = state.items.map((item) => {
        const meta = state.mode === "products"
          ? [item.unit ? `unit: ${item.unit}` : "", ...(item.categories || []).slice(0, 3)]
          : state.mode === "colors"
            ? [`${item.count || 0} items`, ...(item.used_by_products || []).length ? [`products: ${item.used_by_products.length}`] : []]
            : [item.type, item.insulation, item.bim_type];
        return `<button class="item${item.id === state.selectedId ? " active" : ""}" type="button" data-id="${esc(item.id)}" data-kind="${state.mode}">
          <span class="item-title">${esc(item.name)}</span>
          <span class="item-meta">${meta.filter(Boolean).map((value) => `<span>${esc(value)}</span>`).join("")}</span>
        </button>`;
      }).join("") || `<div class="item"><span class="muted">No results.</span></div>`;
      for (const button of document.querySelectorAll(".item[data-id]")) {
        button.addEventListener("click", () => {
          if (state.mode === "colors") loadColorGroup(Number(button.dataset.id));
          else loadDetail(Number(button.dataset.id));
        });
      }
    }

    async function loadColorGroup(id) {
      state.selectedId = id;
      renderList();
      const data = await api(`/api/color-groups/${id}`);
      $("detail").innerHTML = renderColorGroup(data);
      attachColorTileEvents();
    }

    async function loadDetail(id) {
      state.selectedId = id;
      if (state.mode === "colors") renderList();
      else renderFilters();
      const path = state.mode === "products" ? `/api/products/${id}` : state.mode === "colors" ? `/api/colors/${id}` : `/api/systems/${id}`;
      const data = await api(path);
      $("detail").innerHTML = state.mode === "products" ? renderProduct(data) : state.mode === "colors" ? renderColor(data) : renderSystem(data);
      attachColorTileEvents();
    }

    function renderProduct(data) {
      return `
        <div class="detail-head">
          <h2>${esc(data.name)}</h2>
          <div class="summary">
            <span class="pill">ID: ${esc(data.id)}</span>
            <span class="pill">Attributes: ${esc(data.attribute_count)}</span>
            ${data.unit ? `<span class="pill">Unit: ${esc(data.unit)}</span>` : ""}
            ${(data.categories || []).map((item) => `<span class="pill">${esc(item)}</span>`).join("")}
          </div>
        </div>
        ${mediaGrid(data.media)}
        ${productColorLinks(data.color_links)}
        ${featureTable(data.features)}
        ${tableBlock("Product range / SOT", data.sot_table)}
        ${fieldGrid(data.general)}
        ${infoRows("Product information", data.product_information)}
        ${tableBlock("Packages", data.package_table)}
        ${tableBlock("Pallets", data.palette_table)}
        ${tableBlock("Product variants", data.variant_table)}
        ${tableBlock("Documents", data.document_table)}
        ${section("Raw custom attributes", data.custom_attributes)}
      `;
    }

    function renderSystem(data) {
      return `
        <div class="detail-head">
          <h2>${esc(data.name)}</h2>
          <div class="summary">
            <span class="pill">ID: ${esc(data.id)}</span>
            <span class="pill">Attributes: ${esc(data.attribute_count)}</span>
            ${data.type ? `<span class="pill">${esc(data.type)}</span>` : ""}
            ${data.insulation ? `<span class="pill">${esc(data.insulation)}</span>` : ""}
            ${data.bim_type ? `<span class="pill">BIM: ${esc(data.bim_type)}</span>` : ""}
          </div>
        </div>
        ${mediaGrid(data.media)}
        ${fieldGrid(data.general)}
        ${systemVariants(data.system_variants)}
        ${filesSection(data.files || [])}
      `;
    }

    function renderColor(data) {
      return `
        <div class="detail-head">
          <h2>${esc(data.name)}</h2>
          <div class="summary">
            <span class="pill">ID: ${esc(data.id)}</span>
            <span class="pill">${data.type === "advanced" ? "Texture" : "Color"}</span>
            ${data.rgb ? `<span class="pill">RGB ${esc(data.rgb.r)}, ${esc(data.rgb.g)}, ${esc(data.rgb.b)}</span>` : ""}
          </div>
        </div>
        ${colorPreview(data)}
        ${colorParameterTable(data)}
        ${data.type === "advanced" ? textureChannels(data.media) : ""}
        ${colorRelations(data)}
      `;
    }

    function colorParameterTable(data) {
      const params = new Map((data.parameters || []).map((item) => [String(item.name), item.value]));
      const row = (label, value) => `<tr><td>${esc(label)}</td><td>${esc(value)}</td></tr>`;
      const rows = [];
      if (data.type === "advanced") {
        rows.push(row("Name", data.name));
        rows.push(row("Type", data.type));
        rows.push(row("Real width of loaded texture", params.get("RealWidth") ?? ""));
        const used = new Set(["name", "type", "RealWidth"]);
        for (const item of data.parameters || []) {
          if (!used.has(String(item.name))) rows.push(row(item.name, item.value));
        }
      } else {
        rows.push(row("Name", data.name));
        rows.push(row("Type", data.type || "simple"));
        rows.push(row("R", data.rgb ? data.rgb.r : params.get("r") ?? ""));
        rows.push(row("G", data.rgb ? data.rgb.g : params.get("g") ?? ""));
        rows.push(row("B", data.rgb ? data.rgb.b : params.get("b") ?? ""));
        rows.push(row("HBW", params.get("hbw") ?? params.get("HBW") ?? ""));
      }
      return `<div class="data-table">
        <table>
          <thead><tr><th>Parameter</th><th>Value</th></tr></thead>
          <tbody>${rows.join("")}</tbody>
        </table>
      </div>`;
    }

    function renderColorGroup(data) {
      const filter = $("categorySelect").value || "";
      const colors = (data.colors || []).filter((item) => !filter || item.type === filter);
      return `
        <div class="detail-head">
          <h2>${esc(data.name)}</h2>
          <div class="summary">
            <span class="pill">ID: ${esc(data.id)}</span>
            <span class="pill">Items: ${esc(data.count)}</span>
            ${(data.used_by_products || []).length ? `<span class="pill">Products: ${esc(data.used_by_products.length)}</span>` : ""}
          </div>
          ${data.description ? `<div class="muted">${esc(data.description)}</div>` : ""}
        </div>
        ${mediaGrid(data.media)}
        ${groupRelations(data)}
        ${renderColorGallery(colors)}
      `;
    }

    function renderColorGallery(items) {
      if (!items || !items.length) return `<div class="muted">No colors or textures for the selected filter.</div>`;
      return `<div class="color-gallery">${items.map((item) => `
        <div class="color-tile">
          <button type="button" data-color-id="${esc(item.id)}">
            ${colorTilePreview(item)}
            <div class="color-tile-body">
              <strong>${esc(item.name)}</strong>
              <div class="item-meta">
                <span>${item.type === "advanced" ? "texture" : "color"}</span>
                ${item.rgb ? `<span>RGB ${esc(item.rgb.r)}, ${esc(item.rgb.g)}, ${esc(item.rgb.b)}</span>` : ""}
                ${(item.used_by_products || []).length ? `<span>products: ${esc(item.used_by_products.length)}</span>` : ""}
              </div>
            </div>
          </button>
        </div>
      `).join("")}</div>`;
    }

    function colorTilePreview(item) {
      if (item.thumbnail) return `<img src="${esc(item.thumbnail)}" alt="${esc(item.name)}">`;
      if (item.rgb) {
        const color = `rgb(${Number(item.rgb.r) || 0}, ${Number(item.rgb.g) || 0}, ${Number(item.rgb.b) || 0})`;
        return `<span class="swatch" style="background:${esc(color)}"></span>`;
      }
      return `<span class="swatch"></span>`;
    }

    async function openColorModal(id) {
      const data = await api(`/api/colors/${id}`);
      $("modalTitle").textContent = data.name;
      $("modalBody").innerHTML = renderColor(data);
      $("modalBackdrop").hidden = false;
    }

    function closeModal() {
      $("modalBackdrop").hidden = true;
      $("modalBody").innerHTML = "";
    }

    function textureChannels(items) {
      if (!items || !items.length) return "";
      const label = {
        Thumbnail: "Thumbnail",
        MainTexture: "Main texture",
        base_color_map: "Base Color Map",
        normal_map: "Normal Map",
        displacement_map: "Displacement Map",
        opacity_map: "Opacity Map",
        roughness_map: "Roughness Map",
      };
      return `<details open>
        <summary>Texture channels (${items.length})</summary>
        <div class="media-grid">${items.map((item) => `
          <div class="media-card">
            ${item.kind === "image" ? `<img src="${esc(item.url)}" alt="${esc(label[item.parameter] || item.parameter || item.name)}">` : ""}
            <a href="${esc(item.url)}" target="_blank" rel="noreferrer">${esc(label[item.parameter] || item.parameter || item.name)}</a>
          </div>
        `).join("")}</div>
      </details>`;
    }

    function productColorLinks(links) {
      if (!links) return "";
      const structures = links.structures || [];
      const groups = links.groups || [];
      if (!structures.length && !groups.length) return "";
      return `<details open>
        <summary>Product colors, structures and textures</summary>
        ${structures.length ? `<h2>Structures / textures</h2><div class="color-gallery">${structures.map((item) => `
          <div class="color-tile"><button type="button" data-color-id="${esc(item.id)}">${colorTilePreview(item)}<div class="color-tile-body"><strong>${esc(item.name)}</strong></div></button></div>
        `).join("")}</div>` : ""}
        ${groups.length ? `<h2>Color groups</h2><div class="relation-list">${groups.map((group) => `
          <div class="relation-item">
            <strong>${esc(group.name)}</strong>
            <div class="muted">${esc(group.count)} colors/textures</div>
            <div class="media-grid">${(group.sample_colors || []).slice(0, 8).map((item) => `<div class="media-card">${colorTilePreview(item)}<a>${esc(item.name)}</a></div>`).join("")}</div>
          </div>
        `).join("")}</div>` : ""}
      </details>`;
    }

    function colorRelations(data) {
      const products = data.used_by_products || [];
      const groups = data.groups || [];
      if (!products.length && !groups.length) return "";
      return `<details open>
        <summary>Relations</summary>
        ${groups.length ? `<h2>Groups</h2><div class="relation-list">${groups.map((group) => `<div class="relation-item">${esc(group.name)}</div>`).join("")}</div>` : ""}
        ${products.length ? `<h2>Products</h2><div class="relation-list">${products.map((product) => `
          <div class="relation-item">
            <strong>${esc(product.product_name)}</strong>
            <div class="muted">ID ${esc(product.product_id)} · ${esc(product.relation)}${product.group_name ? ` · ${esc(product.group_name)}` : ""}</div>
          </div>
        `).join("")}</div>` : ""}
      </details>`;
    }

    function groupRelations(data) {
      const products = data.used_by_products || [];
      if (!products.length) return "";
      return `<details>
        <summary>Products using this group (${products.length})</summary>
        <div class="relation-list">${products.map((product) => `
          <div class="relation-item"><strong>${esc(product.product_name)}</strong><div class="muted">ID ${esc(product.product_id)}</div></div>
        `).join("")}</div>
      </details>`;
    }

    function attachColorTileEvents() {
      for (const button of document.querySelectorAll("[data-color-id]")) {
        button.addEventListener("click", () => openColorModal(Number(button.dataset.colorId)));
      }
    }

    function colorPreview(data) {
      if (data.thumbnail) {
        return `<div class="media-grid"><div class="media-card"><img src="${esc(data.thumbnail)}" alt="${esc(data.name)}"><a href="${esc(data.thumbnail)}" target="_blank" rel="noreferrer">${esc(data.name)}</a></div></div>`;
      }
      if (!data.rgb) return "";
      const color = `rgb(${Number(data.rgb.r) || 0}, ${Number(data.rgb.g) || 0}, ${Number(data.rgb.b) || 0})`;
      return `<div class="media-grid"><div class="media-card"><span class="swatch" style="background:${esc(color)}"></span><a>${esc(data.name)}</a></div></div>`;
    }

    function mediaGrid(items) {
      if (!items || !items.length) return "";
      return `<div class="media-grid">${items.map((item) => `
        <div class="media-card">
          ${item.kind === "image" ? `<img src="${esc(item.url)}" alt="${esc(item.name)}">` : ""}
          <a href="${esc(item.url)}" target="_blank" rel="noreferrer">${esc(item.name || item.url)}</a>
        </div>
      `).join("")}</div>`;
    }

    function featureTable(features) {
      if (!features || !features.length) return "";
      return `<div class="data-table">
        <table>
          <thead><tr><th>Feature</th><th>Value</th><th>Prefix</th><th>Suffix / unit</th></tr></thead>
          <tbody>${features.map((item) => `
            <tr>
              <td><strong>${esc(item.name)}</strong></td>
              <td>${esc(item.value)}</td>
              <td>${esc(item.prefix || "")}</td>
              <td>${esc(item.suffix || "")}</td>
            </tr>
          `).join("")}</tbody>
        </table>
      </div>`;
    }

    function tableBlock(title, table) {
      if (!table || !table.rows || !table.rows.length) return "";
      return `<details open>
        <summary>${esc(title)} (${table.rows.length})</summary>
        <div class="data-table">
          <table>
            <thead><tr><th>Row</th>${table.columns.map((column) => `<th>${esc(column.label)}</th>`).join("")}</tr></thead>
            <tbody>${table.rows.map((row) => `
              <tr>
                <td>${esc(row.row)}</td>
                ${table.columns.map((column) => `<td>${esc(row.values[column.key] ?? "")}</td>`).join("")}
              </tr>
            `).join("")}</tbody>
          </table>
        </div>
      </details>`;
    }

    function infoRows(title, rows) {
      if (!rows || !rows.length) return "";
      return `<details>
        <summary>${esc(title)} (${rows.length})</summary>
        <div class="grid">
          ${rows.flatMap((row) => row.values || []).filter((item) => item.value !== true).map((item) => `
            <div class="field">
              <div class="field-label">${esc(item.label)}</div>
              <div class="field-value">${esc(item.value)}</div>
            </div>
          `).join("")}
        </div>
      </details>`;
    }

    function systemVariants(variants) {
      if (!variants || !variants.length) return "";
      return variants.map((variant) => `
        <div class="system-variant">
          <h3>${esc(variant.name)}</h3>
          <div class="data-table">
            <table>
              <thead><tr><th>Position</th><th>Layer</th><th>Product / variant</th></tr></thead>
              <tbody>${(variant.layers || []).map((layer) => `
                <tr>
                  <td>${esc(layer.position || layer.row)}</td>
                  <td><strong>${esc(layer.name)}</strong></td>
                  <td>${productSelector(layer.products || [])}</td>
                </tr>
              `).join("")}</tbody>
            </table>
          </div>
        </div>
      `).join("");
    }

    function productSelector(products) {
      if (!products.length) return `<span class="muted">No assigned products</span>`;
      const options = products.map((item, index) => {
        const label = `${item.product_name || item.product_id}${item.variant ? ` / variant ${item.variant}` : ""}${item.default ? " / default" : ""}`;
        return `<option value="${index}">${esc(label)}</option>`;
      }).join("");
      const chips = products.map((item) => `
        <span class="product-chip">${esc(item.product_name || item.product_id)}${item.variant ? `, variant ${esc(item.variant)}` : ""}</span>
      `).join("");
      return `<div class="product-choice"><select>${options}</select><div>${chips}</div></div>`;
    }

    function fieldGrid(items) {
      return `<div class="grid">${(items || []).map((item) => `
        <div class="field">
          <div class="field-label">${esc(item.label)}</div>
          <div class="field-value">${esc(item.value)}</div>
        </div>
      `).join("")}</div>`;
    }

    function section(title, rows) {
      if (!rows || !rows.length) return "";
      return `<details open>
        <summary>${esc(title)} (${rows.length})</summary>
        <table>
          <thead><tr><th>Row</th><th>Fields</th></tr></thead>
          <tbody>${rows.map((row) => `
            <tr>
              <td>${esc(row.row)}</td>
              <td>${row.values.map((item) => `<strong>${esc(item.label)}:</strong> ${esc(item.value)}`).join("<br>")}</td>
            </tr>
          `).join("")}</tbody>
        </table>
      </details>`;
    }

    function filesSection(files) {
      if (!files.length) return "";
      return `<details open>
        <summary>Files (${files.length})</summary>
        <table>
          <thead><tr><th>Name</th><th>Address</th></tr></thead>
          <tbody>${files.map((file) => `
            <tr>
              <td>${esc(file.uploadedfileName || file.fileName || file.AttributeId)}</td>
              <td><a href="${esc(file.fileUrl)}" target="_blank" rel="noreferrer">${esc(file.fileUrl)}</a></td>
            </tr>
          `).join("")}</tbody>
        </table>
      </details>`;
    }

    $("productsTab").addEventListener("click", () => setMode("products"));
    $("systemsTab").addEventListener("click", () => setMode("systems"));
    $("colorsTab").addEventListener("click", () => setMode("colors"));
    $("changeSourceBtn").addEventListener("click", () => changeSourceFiles());
    $("modalCloseBtn").addEventListener("click", () => closeModal());
    $("modalBackdrop").addEventListener("click", (event) => {
      if (event.target === $("modalBackdrop")) closeModal();
    });
    $("searchInput").addEventListener("input", () => loadList());
    $("categorySelect").addEventListener("change", () => {
      if (state.mode === "colors" && state.selectedId) loadColorGroup(state.selectedId);
      else loadList();
    });

    async function startApp() {
      const ready = await loadSourceStatus();
      if (!ready) return;
      await loadSummary();
      await loadList();
    }

    startApp()
      .catch((error) => {
        $("summary").innerHTML = `<span class="warn">${esc(error.message)}</span>`;
        $("detail").innerHTML = `<div class="warn">${esc(error.message)}</div>`;
      });
  </script>
</body>
</html>
