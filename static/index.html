<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BuildData-AI Data Validator</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --line: #d7dee8;
      --text: #172033;
      --muted: #667085;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --ink-soft: #f8fafc;
      --danger: #9a3412;
      --danger-soft: #fee2e2;
      --success: #15803d;
      --success-soft: #dcfce7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    h1 { margin: 0; font-size: 20px; }
    h2 { margin: 0 0 10px; font-size: 16px; }
    .header-main {
      display: grid;
      gap: 6px;
      min-width: 0;
    }
    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .app-nav {
      display: flex;
      gap: 4px;
    }
    .app-nav button {
      min-width: 44px;
    }
    .app-nav button:disabled {
      cursor: not-allowed;
      opacity: .45;
    }
    .project-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }
    main {
      display: grid;
      grid-template-columns: minmax(320px, 430px) 1fr;
      gap: 14px;
      padding: 14px;
      min-height: calc(100vh - 58px);
    }
    aside, section {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      overflow: hidden;
    }
    .toolbar {
      display: grid;
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: var(--ink-soft);
    }
    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
    }
    button {
      border: 0;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .tabs button {
      padding: 10px;
      border-right: 1px solid var(--line);
    }
    .tabs button:last-child { border-right: 0; }
    .tabs button.active {
      background: var(--accent);
      color: #fff;
    }
    .tabs button:disabled {
      cursor: not-allowed;
      background: #eef2f7;
      color: #98a2b3;
    }
    input, select {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
      font: inherit;
    }
    .list {
      max-height: calc(100vh - 204px);
      overflow: auto;
    }
    .filters {
      display: grid;
      gap: 12px;
      max-height: calc(100vh - 204px);
      overflow: auto;
      padding: 12px;
    }
    .filter-group {
      display: grid;
      gap: 7px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }
    .filter-title {
      font-weight: 800;
      line-height: 1.3;
    }
    .filter-option {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 7px;
      align-items: start;
      color: #344054;
      line-height: 1.35;
    }
    .filter-option input {
      width: auto;
      margin: 2px 0 0;
      padding: 0;
    }
    .filter-count {
      color: var(--muted);
      font-size: 12px;
    }
    .clear-filters {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--ink-soft);
      color: var(--text);
    }
    .ai-panel, .correction-panel, .startup-warning {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }
    .startup-warning {
      margin-bottom: 12px;
      border-color: #fed7aa;
      background: #fff7ed;
      color: #7c2d12;
    }
    .ai-panel button, .correction-panel button {
      width: auto;
      justify-self: start;
      padding: 8px 11px;
      border-radius: 4px;
      background: var(--accent);
      color: #fff;
    }
    .ai-panel textarea, .correction-panel textarea {
      width: 100%;
      min-height: 74px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 4px;
      font: inherit;
      resize: vertical;
    }
    .rgb-search-panel {
      display: grid;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      margin-bottom: 14px;
    }
    .rgb-search-layout {
      display: grid;
      grid-template-columns: minmax(240px, 420px) 1fr;
      gap: 14px;
      align-items: start;
    }
    .rgb-map-wrap {
      position: relative;
      width: 100%;
      max-width: 420px;
      aspect-ratio: 1;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
    }
    .rgb-map-caption {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .rgb-map-wrap canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }
    .rgb-selection-box {
      position: absolute;
      border: 2px solid #111827;
      background: rgba(255, 255, 255, .18);
      pointer-events: none;
    }
    .rgb-controls {
      display: grid;
      gap: 10px;
    }
    .rgb-controls label {
      display: grid;
      gap: 5px;
      font-weight: 800;
    }
    .rgb-controls input[type="range"] {
      padding: 0;
    }
    .rgb-readout {
      display: grid;
      gap: 4px;
      color: var(--muted);
      line-height: 1.35;
    }
    .correction-panel label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
    }
    .correction-panel input {
      width: auto;
      margin: 0;
    }
    .item {
      width: 100%;
      display: block;
      padding: 12px;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: #fff;
      text-align: left;
    }
    .item:hover, .item.active { background: var(--accent-soft); }
    .item-title { display: block; font-weight: 800; }
    .item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .content {
      padding: 14px;
      max-height: calc(100vh - 88px);
      overflow: auto;
    }
    .results-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      align-items: start;
    }
    .result-card {
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      width: 100%;
      padding: 12px;
      border: 1px solid var(--line);
      background: #fff;
      text-align: left;
      color: var(--text);
    }
    .result-card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, .18);
    }
    .result-select {
      position: absolute;
      top: 8px;
      left: 8px;
      margin: 0;
      width: auto;
      z-index: 1;
    }
    .status-pill {
      display: inline-block;
      margin-top: 2px;
      padding: 0;
      border-radius: 0;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.2;
    }
    .status-accepted {
      background: transparent;
      color: var(--success);
    }
    .status-not-accepted {
      background: transparent;
      color: #991b1b;
    }
    .results-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .results-actions button {
      width: auto;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
    }
    .results-actions button.active-model {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .results-actions button.active-model:disabled {
      opacity: 1;
      cursor: default;
    }
    .result-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 14px rgba(15, 23, 42, .12);
    }
    .result-card img,
    .result-card .result-placeholder {
      width: 100%;
      max-height: 170px;
      object-fit: contain;
      display: block;
      background: var(--ink-soft);
    }
    .result-placeholder {
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 28px;
    }
    .result-title {
      font-weight: 800;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .pill {
      display: inline-block;
      padding: 4px 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #344054;
      font-size: 12px;
    }
    .detail-head {
      display: grid;
      gap: 8px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 14px;
    }
    .nav-return {
      margin-bottom: 10px;
    }
    .nav-return button {
      width: auto;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
      color: var(--accent);
      font-weight: 800;
    }
    .nav-return button:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 10px;
    }
    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      margin: 12px 0;
    }
    .media-card {
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
    }
    .media-card img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      background: var(--ink-soft);
    }
    .media-card a {
      display: block;
      padding: 8px;
      color: var(--text);
      font-weight: 700;
      overflow-wrap: anywhere;
    }
    .swatch {
      width: 100%;
      aspect-ratio: 4 / 3;
      display: block;
      background:
        linear-gradient(45deg, #d0d5dd 25%, transparent 25%),
        linear-gradient(-45deg, #d0d5dd 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #d0d5dd 75%),
        linear-gradient(-45deg, transparent 75%, #d0d5dd 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
    }
    .source-button {
      padding: 8px 10px;
      border-radius: 4px;
      background: var(--ink-soft);
      border: 1px solid var(--line);
      color: var(--text);
    }
    .field, details {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      overflow: hidden;
    }
    .field {
      padding: 9px 10px;
    }
    .field-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .field-note-button {
      width: auto;
      flex: 0 0 auto;
      padding: 2px 6px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
      color: var(--accent);
      font-size: 11px;
      line-height: 1.2;
    }
    .field-note-button:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
    }
    .field-note-button.is-edited {
      border-color: #d92d20;
      background: #fff1f0;
      color: #b42318;
      font-weight: 800;
    }
    .field-note-button.is-preview-correction {
      border-color: #fecdca;
      background: #fff1f0;
      color: #b42318;
      font-weight: 800;
      cursor: default;
    }
    .field-note-button.is-preview-correction:disabled {
      opacity: 1;
    }
    .original-preview-banner {
      padding: 8px 10px;
      border: 1px solid #fecdca;
      border-radius: 4px;
      background: #fff7f6;
      color: #7a271a;
      font-weight: 700;
    }
    .edited-value {
      color: #b42318;
      font-weight: 800;
    }
    .edited-field {
      border-color: #f04438;
      box-shadow: inset 3px 0 0 #f04438;
    }
    .patch-current {
      color: #b42318;
      font-weight: 800;
    }
    .record-patch-summary {
      margin-top: 8px;
      border: 1px solid #fecdca;
      border-radius: 6px;
      background: #fff1f0;
      overflow: hidden;
    }
    .record-patch-summary header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid #fecdca;
      background: #fff7f6;
    }
    .record-patch-summary table {
      margin: 0;
      background: #fff;
    }
    .record-patch-summary td,
    .record-patch-summary th {
      border-color: #fecdca;
    }
    .patch-editor {
      display: grid;
      gap: 10px;
    }
    .patch-editor label,
    .patch-editor .patch-input-group {
      display: grid;
      gap: 6px;
      font-weight: 800;
    }
    .patch-editor textarea,
    .patch-editor input,
    .patch-editor select {
      width: 100%;
      max-width: none;
      font: inherit;
    }
    .patch-editor textarea {
      min-height: 160px;
      resize: vertical;
      line-height: 1.45;
    }
    .modal-body.is-field-editor [data-correction-comment] {
      min-height: 120px;
    }
    .table-cell-note {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      min-width: 140px;
    }
    .table-cell-note .field-note-button {
      flex: 0 0 auto;
    }
    .field-value {
      margin-top: 4px;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
      line-height: 1.4;
    }
    details { margin-top: 12px; }
    summary {
      padding: 11px 12px;
      background: var(--ink-soft);
      cursor: pointer;
      font-weight: 800;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 8px;
      border-top: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    th {
      color: #344054;
      background: #fff;
      font-size: 12px;
    }
    td {
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }
    .data-table {
      margin: 12px 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: auto;
      background: #fff;
    }
    .data-table table { min-width: 620px; }
    .data-table th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--ink-soft);
    }
    .data-table th small {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      line-height: 1.25;
    }
    .system-variant {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
    }
    .system-variant h3 {
      margin: 0;
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--ink-soft);
      font-size: 15px;
    }
    .product-choice {
      display: grid;
      gap: 4px;
    }
    .product-choice select {
      max-width: 360px;
      margin: 0;
    }
    .product-chip {
      display: inline-block;
      margin: 2px 4px 2px 0;
      padding: 3px 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--ink-soft);
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
    }
    button.product-chip:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
    }
    .color-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 12px;
    }
    .color-tile {
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
      text-align: left;
    }
    .color-tile:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 14px rgba(15, 23, 42, .12);
    }
    .color-tile button {
      width: 100%;
      display: block;
      padding: 0;
      text-align: left;
      background: #fff;
      color: var(--text);
      font-weight: 400;
    }
    .color-tile img,
    .color-tile .swatch {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
    }
    .color-tile-body {
      padding: 9px;
    }
    .relation-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .relation-item {
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--ink-soft);
    }
    button.relation-item {
      width: 100%;
      text-align: left;
      color: var(--text);
    }
    button.relation-item:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(15, 23, 42, .48);
      z-index: 20;
    }
    .modal-backdrop[hidden] { display: none; }
    .modal {
      width: min(1180px, 96vw);
      max-height: 92vh;
      overflow: auto;
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 18px 60px rgba(15, 23, 42, .28);
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--ink-soft);
    }
    .modal-head h2 { margin: 0; }
    .modal-close {
      width: auto;
      padding: 8px 10px;
      border-radius: 4px;
      background: var(--accent);
      color: #fff;
    }
    .modal-body { padding: 14px; }
    .modal-body.is-field-editor {
      padding: 18px;
    }
    .project-form {
      display: grid;
      gap: 10px;
    }
    .project-form label {
      display: grid;
      gap: 5px;
      font-weight: 800;
    }
    .project-form textarea {
      width: 100%;
      min-height: 84px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 4px;
      font: inherit;
      resize: vertical;
    }
    .progress-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 8px;
    }
    .preview-actions {
      display: flex;
      gap: 8px;
      margin: 10px 0 12px;
    }
    .preview-actions button {
      width: auto;
      padding: 9px 11px;
      border-radius: 4px;
      background: var(--accent);
      color: #fff;
    }
    .material-preview {
      display: grid;
      gap: 10px;
    }
    .material-preview canvas {
      width: 100%;
      aspect-ratio: 16 / 10;
      min-height: 360px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #eef1f4;
      display: block;
      cursor: grab;
      touch-action: none;
    }
    .material-preview canvas:active {
      cursor: grabbing;
    }
    .muted { color: var(--muted); }
    .warn { color: var(--danger); }
    .import-panel {
      display: grid;
      gap: 12px;
      max-width: 900px;
    }
    .import-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap: 8px;
    }
    .import-file {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
    }
    .import-file strong { overflow-wrap: anywhere; }
    .import-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .import-actions button {
      width: auto;
      padding: 10px 14px;
      border-radius: 4px;
      background: var(--accent);
      color: #fff;
    }
    @media (max-width: 940px) {
      main { grid-template-columns: 1fr; }
      .list, .content { max-height: none; }
      .filters { max-height: none; }
      .grid { grid-template-columns: 1fr; }
      .import-list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-main">
      <h1>BuildData-AI Data Validator</h1>
      <div id="projectSummary" class="project-summary"></div>
    </div>
    <div id="summary" class="summary">Loading data...</div>
    <div class="header-actions">
      <div class="app-nav" aria-label="Application navigation">
        <button id="appBackBtn" class="source-button" type="button" disabled>Back</button>
        <button id="appForwardBtn" class="source-button" type="button" disabled>Forward</button>
      </div>
      <button id="projectBtn" class="source-button" type="button">Review project</button>
      <button id="validationModelBtn" class="source-button" type="button">Validation rules</button>
      <button id="exportCorrectedBtn" class="source-button" type="button">Export corrected data</button>
      <button id="changeSourceBtn" class="source-button" type="button">Change source files</button>
    </div>
  </header>
  <main>
    <aside>
      <div class="toolbar">
        <div class="tabs">
          <button id="productsTab" class="active" type="button">Products</button>
          <button id="systemsTab" type="button">Building Elements</button>
          <button id="colorsTab" type="button">Visual Attributes</button>
          <button id="correctionsTab" type="button">Corrections</button>
        </div>
        <input id="searchInput" type="search" placeholder="Search by name, category, type...">
        <select id="categorySelect" hidden></select>
        <div id="aiPanel" class="ai-panel" hidden>
          <strong>AI / validation search</strong>
          <textarea id="aiQuestion" placeholder="Ask about products, missing fields, variants, building elements, colors or features..."></textarea>
          <button id="aiSearchBtn" type="button">Search</button>
          <div id="aiStatus" class="muted"></div>
        </div>
      </div>
      <div id="list" class="list"></div>
    </aside>
    <section>
      <div id="detail" class="content">
        <div class="muted">Select a record from the list on the left.</div>
      </div>
    </section>
  </main>
  <div id="modalBackdrop" class="modal-backdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h2 id="modalTitle">Details</h2>
        <button id="modalCloseBtn" class="modal-close" type="button">Close</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>
  <script>
    const state = {
      mode: "products",
      view: "grid",
      items: [],
      selectedId: null,
      selectedRecords: new Set(),
      filters: { products: {}, systems: {}, colors: {}, corrections: {} },
      filterDefs: [],
      notesByKey: {},
      requestId: 0,
      ai: { available: false },
      validationModel: null,
      aiResult: null,
      detailView: "list",
      rgbSelection: null,
      colorSearchModel: "rgb",
      rgbRange: { rMin: 0, rMax: 255, gMin: 0, gMax: 255, bMin: 0, bMax: 255 },
      hsbRange: { hMin: 0, hMax: 360, sMin: 0, sMax: 100, vMin: 0, vMax: 100 },
      rgbMatches: [],
      summary: null,
      project: null,
      patchesByKey: {},
      navStack: [],
      appBackStack: [],
      appForwardStack: [],
      restoringHistory: false,
      categoryValue: "",
      loadedDataPreviewKey: "",
    };
    const REQUIRED_FILES = [
      "productsModels.json",
      "productsAttributes.json",
      "products.json",
      "buildingsElementsModels.json",
      "buildingsElementsAttributes.json",
      "building_elements.json",
      "colors.json",
      "colorParameters.json",
      "colorGroups.json",
      "colorGroupParameters.json",
    ];
    const $ = (id) => document.getElementById(id);
    const esc = (value) => String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");

    async function api(path) {
      const response = await fetch(path);
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || "Data read error");
      return data;
    }

    async function apiPost(path, payload) {
      const response = await fetch(path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload || {}),
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || "Request error");
      return data;
    }

    function modeAvailable(mode) {
      if (mode === "systems") return Number(state.summary?.systems || 0) > 0;
      if (mode === "colors") return Number(state.summary?.colors || 0) > 0 || Number(state.summary?.color_groups || 0) > 0;
      return true;
    }

    function applyDataAvailability() {
      const systemsAvailable = modeAvailable("systems");
      const colorsAvailable = modeAvailable("colors");
      $("systemsTab").disabled = !systemsAvailable;
      $("systemsTab").title = systemsAvailable ? "" : "No building elements in the current source data";
      $("colorsTab").disabled = !colorsAvailable;
      $("colorsTab").title = colorsAvailable ? "" : "No visual attributes in the current source data";
      if (!modeAvailable(state.mode)) {
        applyModeChrome("products");
      }
    }

    function applyModeChrome(mode) {
      state.mode = mode;
      $("productsTab").classList.toggle("active", mode === "products");
      $("systemsTab").classList.toggle("active", mode === "systems");
      $("colorsTab").classList.toggle("active", mode === "colors");
      $("correctionsTab").classList.toggle("active", mode === "corrections");
      $("categorySelect").hidden = mode !== "colors";
      $("searchInput").hidden = mode === "corrections";
    }

    function setMode(mode, options = {}) {
      if (!modeAvailable(mode)) {
        $("detail").innerHTML = `<div class="muted">${esc(modeLabel(mode))} is not available in the current source data.</div>`;
        return Promise.resolve(false);
      }
      if (!options.skipAppHistory) rememberAppLocation();
      applyModeChrome(mode);
      state.selectedId = null;
      state.selectedRecords = new Set();
      state.detailView = "list";
      if (!options.keepAiResult) state.aiResult = null;
      if (!options.keepNavigation) state.navStack = [];
      $("searchInput").value = "";
      renderFilterOptions();
      return loadList().then(() => true);
    }

    function cloneFilters(filters = state.filters) {
      return JSON.parse(JSON.stringify(filters || {}));
    }

    function activeDetailTitle() {
      return document.querySelector(".detail-head h2")?.textContent?.trim() || "";
    }

    function modeLabel(mode = state.mode) {
      if (mode === "products") return "Products";
      if (mode === "systems") return "Building Elements";
      if (mode === "colors") return "Visual Attributes";
      if (mode === "corrections") return "Corrections";
      return "Previous view";
    }

    function currentAppLocation(label = "") {
      const selectedId = state.selectedId == null ? null : state.selectedId;
      const kind = state.detailView === "ai_result"
        ? "ai_result"
        : selectedId == null
        ? "list"
        : state.mode === "corrections"
          ? "note"
          : state.mode === "colors"
            ? "color_group"
            : "detail";
      return {
        mode: state.mode,
        kind,
        selectedId,
        filters: cloneFilters(),
        search: $("searchInput")?.value || "",
        category: state.categoryValue || "",
        view: state.view,
        aiResult: state.detailView === "ai_result" ? state.aiResult : null,
        label: label || activeDetailTitle() || modeLabel(),
      };
    }

    function sameAppLocation(left, right) {
      if (!left || !right) return false;
      return left.mode === right.mode
        && left.kind === right.kind
        && String(left.selectedId ?? "") === String(right.selectedId ?? "")
        && left.search === right.search
        && left.category === right.category
        && left.view === right.view
        && JSON.stringify(left.filters || {}) === JSON.stringify(right.filters || {});
    }

    function rememberAppLocation(label = "") {
      if (state.restoringHistory) return;
      const entry = currentAppLocation(label);
      const last = state.appBackStack[state.appBackStack.length - 1];
      if (!sameAppLocation(entry, last)) {
        state.appBackStack.push(entry);
        if (state.appBackStack.length > 80) state.appBackStack.shift();
      }
      state.appForwardStack = [];
      updateAppNavigationButtons();
    }

    function updateAppNavigationButtons() {
      if ($("appBackBtn")) $("appBackBtn").disabled = !state.appBackStack.length;
      if ($("appForwardBtn")) $("appForwardBtn").disabled = !state.appForwardStack.length;
    }

    async function restoreAppLocation(entry) {
      state.restoringHistory = true;
      try {
        if (!modeAvailable(entry.mode)) {
          entry = { mode: "products", kind: "list", selectedId: null, filters: cloneFilters(), search: "", category: "", view: state.view, label: "Products" };
        }
        applyModeChrome(entry.mode);
        state.filters = cloneFilters(entry.filters);
        state.view = entry.view || state.view;
        state.selectedId = null;
        state.selectedRecords = new Set();
        $("searchInput").value = entry.search || "";
        renderFilterOptions();
        $("categorySelect").value = entry.category || "";
        state.categoryValue = entry.category || "";
        await loadList();
        if (entry.kind === "ai_result") {
          state.aiResult = entry.aiResult;
          renderAiResult();
        } else if (entry.kind === "note") {
          openNote(entry.selectedId, { skipAppHistory: true });
        } else if (entry.kind === "color_group") {
          await loadColorGroup(Number(entry.selectedId), { skipAppHistory: true });
        } else if (entry.kind === "detail") {
          await loadDetail(Number(entry.selectedId), { skipAppHistory: true });
        }
      } finally {
        state.restoringHistory = false;
        updateAppNavigationButtons();
      }
    }

    async function appHistoryBack() {
      const previous = state.appBackStack.pop();
      if (!previous) return;
      state.appForwardStack.push(currentAppLocation());
      await restoreAppLocation(previous);
    }

    async function appHistoryForward() {
      const next = state.appForwardStack.pop();
      if (!next) return;
      state.appBackStack.push(currentAppLocation());
      await restoreAppLocation(next);
    }

    function currentNavigationEntry(label = "") {
      if (state.detailView === "ai_result" && state.aiResult) {
        return {
          mode: state.mode,
          selectedId: null,
          kind: "ai_result",
          label: label || "AI search result",
          aiResult: state.aiResult,
        };
      }
      if (!state.selectedId) return null;
      const title = label || activeDetailTitle() || modeLabel();
      return {
        mode: state.mode,
        selectedId: state.selectedId,
        kind: state.mode === "corrections" ? "note" : state.mode === "colors" ? "color_group" : "detail",
        label: title,
      };
    }

    function pushCurrentNavigation(label = "") {
      const entry = currentNavigationEntry(label);
      if (!entry) return;
      const last = state.navStack[state.navStack.length - 1];
      if (last && last.mode === entry.mode && String(last.selectedId) === String(entry.selectedId) && last.kind === entry.kind) return;
      state.navStack.push(entry);
    }

    function navigationBackControl() {
      const previous = state.navStack[state.navStack.length - 1];
      if (!previous) return "";
      return `<div class="nav-return"><button type="button" data-nav-back>Back to ${esc(previous.label || modeLabel(previous.mode))}</button></div>`;
    }

    async function restorePreviousView() {
      const previous = state.navStack.pop();
      if (!previous) return;
      applyModeChrome(previous.mode);
      state.selectedId = previous.selectedId;
      state.selectedRecords = new Set();
      await loadList();
      if (previous.kind === "ai_result") {
        state.aiResult = previous.aiResult;
        renderAiResult();
      } else if (previous.kind === "note") {
        openNote(previous.selectedId, { skipAppHistory: true });
      } else if (previous.kind === "color_group") {
        await loadColorGroup(Number(previous.selectedId), { skipAppHistory: true });
      } else {
        await loadDetail(Number(previous.selectedId), { skipAppHistory: true });
      }
    }

    function attachNavigationControls() {
      const button = document.querySelector("[data-nav-back]");
      if (button) button.addEventListener("click", restorePreviousView);
    }

    function recordTypeForMode(mode = state.mode) {
      if (mode === "products") return "product";
      if (mode === "systems") return "system";
      if (mode === "colors") return "color_group";
      return "";
    }

    async function refreshNotesIndex() {
      const data = await api("/api/notes");
      state.notesByKey = Object.fromEntries((data.items || []).map((item) => [item.key, item]));
    }

    function noteForItem(item, type = recordTypeForMode()) {
      return state.notesByKey[`${type}:${item.id}`] || { accepted: false, resolved: false, attachments: [] };
    }

    async function refreshPatchIndex() {
      const data = await api("/api/patches");
      state.patchesByKey = Object.fromEntries((data.items || []).filter((item) => item.active).map((item) => [item.key, item]));
    }

    function patchKey(recordType, recordId, fieldKey) {
      return `${recordType}:${recordId}:${fieldKey}`;
    }

    async function loadSourceStatus() {
      const status = await api("/api/source/status");
      if (!status.ready) {
        renderImport(status);
        return false;
      }
      return true;
    }

    function renderImport(status) {
      $("projectSummary").innerHTML = "";
      $("summary").innerHTML = `
        <span class="pill">Data source is not loaded yet</span>
        <span class="pill">${esc(status.data_dir)}</span>
      `;
      $("list").innerHTML = "";
      $("detail").innerHTML = `
        <div class="import-panel">
          <h2>PIM Data Import</h2>
          <div class="muted">Upload JSON files exported from PIM. You can select all files at once or add them one by one.</div>
          <div class="import-list">
            ${(status.files || []).map((file) => `
              <div class="import-file">
                <strong>${esc(file.name)}</strong>
                <span class="${file.exists ? "" : "warn"}">${file.exists ? `OK (${Math.round(file.size / 1024)} KB)` : "missing"}</span>
              </div>
            `).join("")}
          </div>
          <div class="import-actions">
            <input id="sourceFilesInput" type="file" accept=".json" multiple>
            <button id="uploadSourceFilesBtn" type="button">Upload files</button>
          </div>
          <div id="uploadStatus" class="muted">Required core files: ${esc((status.missing_core || []).join(", ") || "core file set is ready")}.</div>
        </div>
      `;
      $("uploadSourceFilesBtn").addEventListener("click", uploadSourceFiles);
    }

    async function changeSourceFiles() {
      const ok = window.confirm("Start a new data browsing project? This clears the uploaded source files, local notes, data corrections and optional validation rules. Original JSON files outside this browser are not changed.");
      if (!ok) return;
      const response = await fetch("/api/source/clear", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ reset_review: true }),
      });
      const data = await response.json();
      if (!response.ok) {
        $("detail").innerHTML = `<div class="warn">${esc(data.error || "Could not clear source files.")}</div>`;
        return;
      }
      state.items = [];
      state.selectedId = null;
      state.notesByKey = {};
      state.patchesByKey = {};
      state.project = null;
      state.validationModel = null;
      renderImport(data);
    }

    async function uploadSourceFiles() {
      const input = $("sourceFilesInput");
      const status = $("uploadStatus");
      if (!input.files.length) {
        status.textContent = "Select JSON files to upload.";
        return;
      }
      const body = new FormData();
      for (const file of input.files) {
        body.append("files", file, file.name);
      }
      status.textContent = "Uploading files...";
      const response = await fetch("/api/source/upload", { method: "POST", body });
      const data = await response.json();
      if (!response.ok) {
        status.textContent = data.error || "Could not upload files.";
        return;
      }
      if (data.ready) {
        await startApp();
      } else {
        renderImport(data);
      }
    }

    async function loadSummary() {
      const summary = await api("/api/summary");
      state.summary = summary;
      const visualAttributesTotal = Number(summary.colors || 0) + Number(summary.color_groups || 0);
      $("summary").innerHTML = `
        <span class="pill">Products: ${esc(summary.products)}</span>
        <span class="pill${summary.systems ? "" : " muted"}">Building elements: ${summary.systems ? esc(summary.systems) : "not in source"}</span>
        <span class="pill${visualAttributesTotal ? "" : " muted"}">Visual attributes: ${visualAttributesTotal ? esc(`${summary.colors || 0} items / ${summary.color_groups || 0} groups`) : "not in source"}</span>
        ${summary.consistency?.products_without_building_element ? `<span class="pill warn">Unlinked products: ${esc(summary.consistency.products_without_building_element)}</span>` : ""}
        <span class="pill">Source: ${esc(summary.data_dir)}</span>
      `;
      applyDataAvailability();
    }

    async function loadProject() {
      const project = await api("/api/project");
      state.project = project;
      renderProjectHeader();
      return project;
    }

    async function loadValidationModel() {
      state.validationModel = await api("/api/validation/model");
      return state.validationModel;
    }

    function openValidationModelModal() {
      const model = state.validationModel || { fields: [] };
      $("modalTitle").textContent = "Validation rules";
      $("modalBody").innerHTML = `
        <div class="project-form">
          <div class="field">
            <div class="field-label">Loaded fields</div>
            <div class="field-value">${esc((model.fields || []).length)} fields${model.configured ? `\n${esc(model.model_file || "")}` : "\nBuilt-in defaults only"}</div>
          </div>
          <label>Rules JSON
            <textarea id="validationModelJsonInput" spellcheck="false">${esc(JSON.stringify({ fields: model.fields || [] }, null, 2))}</textarea>
          </label>
          <label>Import from page URL
            <input id="validationModelUrlInput" placeholder="https://...">
          </label>
          <div class="preview-actions">
            <button type="button" data-save-validation-model>Save JSON model</button>
            <input id="validationModelFileInput" type="file" accept=".json,.txt,.md,.csv" hidden>
            <button type="button" data-import-validation-model-file>Import file</button>
            <button type="button" data-import-validation-model-url>Import URL</button>
          </div>
          <div id="validationModelStatus" class="muted"></div>
        </div>
      `;
      $("modalBackdrop").hidden = false;
      document.querySelector("[data-save-validation-model]").addEventListener("click", saveValidationModelJson);
      document.querySelector("[data-import-validation-model-file]").addEventListener("click", () => $("validationModelFileInput").click());
      document.querySelector("[data-import-validation-model-url]").addEventListener("click", importValidationModelUrl);
      $("validationModelFileInput").addEventListener("change", importValidationModelFile);
    }

    async function saveValidationModelJson() {
      const status = $("validationModelStatus");
      try {
        status.textContent = "Saving validation rules...";
        const payload = JSON.parse($("validationModelJsonInput").value || "{}");
        state.validationModel = await apiPost("/api/validation/model", payload);
        status.textContent = `Validation rules saved. Fields: ${(state.validationModel.fields || []).length}.`;
      } catch (error) {
        status.textContent = error.message || "Could not save validation rules.";
      }
    }

    async function importValidationModelFile() {
      const input = $("validationModelFileInput");
      const status = $("validationModelStatus");
      if (!input.files.length) return;
      try {
        status.textContent = "Importing validation rules...";
        const file = input.files[0];
        const text = await file.text();
        let payload;
        try {
          payload = JSON.parse(text);
        } catch {
          payload = { text, source: file.name };
        }
        state.validationModel = await apiPost("/api/validation/model", payload);
        input.value = "";
        openValidationModelModal();
        $("validationModelStatus").textContent = `Validation rules imported. Fields: ${(state.validationModel.fields || []).length}.`;
      } catch (error) {
        status.textContent = error.message || "Could not import validation rules.";
        input.value = "";
      }
    }

    async function importValidationModelUrl() {
      const status = $("validationModelStatus");
      const url = $("validationModelUrlInput").value.trim();
      if (!url) {
        status.textContent = "Enter a URL first.";
        return;
      }
      try {
        status.textContent = "Loading validation rules from URL...";
        state.validationModel = await apiPost("/api/validation/model", { url });
        openValidationModelModal();
        $("validationModelStatus").textContent = `Validation rules loaded. Fields: ${(state.validationModel.fields || []).length}.`;
      } catch (error) {
        status.textContent = error.message || "Could not load validation rules from URL.";
      }
    }

    function renderProjectHeader() {
      const project = state.project?.project;
      const progress = state.project?.progress;
      if (!project || !progress) {
        $("projectSummary").innerHTML = "";
        return;
      }
      if (!project.configured && !progress.notes_total) {
        $("projectSummary").innerHTML = "";
        return;
      }
      $("projectSummary").innerHTML = `
        ${project.configured ? `<span>${esc(project.name)}</span>` : ""}
        ${project.client ? `<span>Client: ${esc(project.client)}</span>` : ""}
        ${project.configured ? `<span>Status: ${esc((project.status || "").replaceAll("_", " "))}</span>` : ""}
      `;
    }

    function openProjectModal() {
      const project = state.project?.project || {};
      const progress = state.project?.progress || {};
      const totals = progress.totals || {};
      const accepted = progress.accepted || {};
      const open = progress.open_corrections || {};
      $("modalTitle").textContent = "Review project";
      $("modalBody").innerHTML = `
        <div class="project-form">
          <label>Project name
            <input id="projectNameInput" value="${esc(project.name || "")}">
          </label>
          <label>Client
            <input id="projectClientInput" value="${esc(project.client || "")}">
          </label>
          <label>Reviewer
            <input id="projectReviewerInput" value="${esc(project.reviewer || "")}">
          </label>
          <label>Status
            <select id="projectStatusInput">
              ${["draft", "in_review", "client_review", "completed", "on_hold"].map((status) => `<option value="${status}"${status === project.status ? " selected" : ""}>${esc(status.replaceAll("_", " "))}</option>`).join("")}
            </select>
          </label>
          <label>Due date
            <input id="projectDueDateInput" type="date" value="${esc(project.due_date || "")}">
          </label>
          <label>Description
            <textarea id="projectDescriptionInput">${esc(project.description || "")}</textarea>
          </label>
          <div class="progress-grid">
            ${projectProgressCard("Products", accepted.product, totals.product, open.product)}
            ${projectProgressCard("Building Elements", accepted.system, totals.system, open.system)}
            ${projectProgressCard("Visual Attributes", accepted.visual_attribute, totals.visual_attribute, open.visual_attribute)}
          </div>
          ${progress.ignored_notes ? `<div class="startup-warning">${esc(progress.ignored_notes)} saved notes are not linked to records in the current source data.</div>` : ""}
          <div class="field">
            <div class="field-label">Server storage</div>
            <div class="field-value">${esc(state.project?.storage?.project_file || "")}
${esc(state.project?.storage?.notes_file || "")}</div>
          </div>
          <div class="preview-actions">
            <button type="button" data-save-project>Save project</button>
            <button type="button" data-export-project>Export project package</button>
            <button type="button" data-export-corrected>Export corrected data ZIP</button>
            <input id="projectImportInput" type="file" accept=".json" hidden>
            <button type="button" data-import-project>Import project package</button>
          </div>
          <div id="projectSaveStatus" class="muted"></div>
        </div>
      `;
      $("modalBackdrop").hidden = false;
      document.querySelector("[data-save-project]").addEventListener("click", saveProject);
      document.querySelector("[data-export-project]").addEventListener("click", () => {
        window.location.href = "/api/project/export";
      });
      document.querySelector("[data-export-corrected]").addEventListener("click", () => {
        window.location.href = "/api/export/corrected-data.zip";
      });
      document.querySelector("[data-import-project]").addEventListener("click", () => $("projectImportInput").click());
      $("projectImportInput").addEventListener("change", importProjectPackage);
    }

    function projectProgressCard(label, accepted = 0, total = 0, openCorrections = 0) {
      const percent = total ? Math.round((Number(accepted || 0) / Number(total || 0)) * 100) : 0;
      return `<div class="field">
        <div class="field-label">${esc(label)}</div>
        <div class="field-value">${esc(accepted || 0)} / ${esc(total || 0)} accepted (${esc(percent)}%)${openCorrections ? `\n${esc(openCorrections)} open corrections` : ""}</div>
      </div>`;
    }

    async function saveProject() {
      const payload = {
        name: $("projectNameInput").value,
        client: $("projectClientInput").value,
        reviewer: $("projectReviewerInput").value,
        status: $("projectStatusInput").value,
        due_date: $("projectDueDateInput").value,
        description: $("projectDescriptionInput").value,
      };
      $("projectSaveStatus").textContent = "Saving project...";
      state.project = await apiPost("/api/project", payload);
      renderProjectHeader();
      $("projectSaveStatus").textContent = "Project saved.";
    }

    async function importProjectPackage() {
      const input = $("projectImportInput");
      if (!input.files.length) return;
      $("projectSaveStatus").textContent = "Importing project package...";
      try {
        const payload = JSON.parse(await input.files[0].text());
        state.project = await apiPost("/api/project/import", payload);
        renderProjectHeader();
        await refreshNotesIndex();
        if (state.mode === "corrections") await loadList();
        input.value = "";
        openProjectModal();
        $("projectSaveStatus").textContent = `Project imported. Notes: ${state.project.imported_notes?.imported || 0}.`;
      } catch (error) {
        $("projectSaveStatus").textContent = error.message || "Could not import project package.";
        input.value = "";
      }
    }

    async function refreshProjectProgress() {
      try {
        await loadProject();
      } catch (error) {
        console.warn("Project progress could not be refreshed", error);
      }
    }

    async function loadAiStatus() {
      const status = await api("/api/ai/status");
      state.ai = status;
      $("aiPanel").hidden = false;
      $("aiStatus").textContent = status.available
        ? "AI available. Validation rules are also available."
        : "AI unavailable. Validation rules are available.";
    }

    async function runAiSearch() {
      const question = $("aiQuestion").value.trim();
      if (!question) {
        $("aiStatus").textContent = "Enter a question first.";
        return;
      }
      $("aiStatus").textContent = "AI is searching...";
      try {
        const result = await apiPost("/api/ai/search", { question, mode: state.mode === "corrections" ? "" : state.mode });
        state.selectedId = null;
        state.aiResult = { question, result };
        renderAiResult();
        $("aiStatus").textContent = result.validation
          ? `Data query complete. Results: ${(result.findings || []).length}.`
          : result.timed_out ? "AI did not answer in time." : "AI response ready.";
      } catch (error) {
        $("aiStatus").textContent = error.message || "Search unavailable";
      }
    }

    function renderAiResult() {
      if (!state.aiResult) return;
      state.detailView = "ai_result";
      state.selectedId = null;
      const { question, result } = state.aiResult;
      const answer = result.answer || "AI did not return a clear answer. Try asking more specifically.";
      $("detail").innerHTML = `
        ${navigationBackControl()}
        <div class="detail-head">
          <h2>AI search result</h2>
          <div class="summary"><span class="pill">${result.validation ? "Data query result" : result.available === false ? "AI unavailable" : "AI available"}</span></div>
        </div>
        <div class="field">
          <div class="field-label">Question</div>
          <div class="field-value">${esc(question)}</div>
        </div>
        <div class="field">
          <div class="field-label">Answer</div>
          <div class="field-value">${esc(answer)}</div>
        </div>
        ${validationFindings(result.findings || [])}
        ${aiRelatedRecords(result.related_records || [])}
      `;
      attachAiRecordLinks();
      attachNavigationControls();
    }

    function validationFindings(findings) {
      if (!findings.length) return "";
      return `<details open>
        <summary>Data query results (${findings.length})</summary>
        <div class="data-table">
          <table>
            <thead><tr><th>Record</th><th>Field</th><th>Issue</th><th>Details</th></tr></thead>
            <tbody>${findings.map((item) => `
              <tr>
                <td><strong>${esc(item.name || item.id)}</strong><br><span class="muted">${esc(item.type)} / ID ${esc(item.id)}</span></td>
                <td>${esc(item.field || "")}</td>
                <td>${esc(item.issue || "")}</td>
                <td>${esc(item.message || "")}${item.missing_rows?.length ? `<br><span class="muted">Missing rows: ${esc(item.missing_rows.join(", "))}</span>` : ""}</td>
              </tr>
            `).join("")}</tbody>
          </table>
        </div>
      </details>`;
    }

    function aiRelatedRecords(records) {
      if (!records.length) return "";
      return `<details open>
        <summary>Related records (${records.length})</summary>
        <div class="relation-list">${records.map((record) => `
          <button class="relation-item" type="button" data-ai-record="${esc(record.mode)}:${esc(record.kind)}:${esc(record.id)}">
            <strong>${esc(record.name || record.id)}</strong>
            <div class="muted">${esc(record.type)} / ID ${esc(record.id)}</div>
          </button>
        `).join("")}</div>
      </details>`;
    }

    function attachAiRecordLinks() {
      for (const button of document.querySelectorAll("[data-ai-record]")) {
        button.addEventListener("click", async () => {
          const [mode, kind, id] = button.dataset.aiRecord.split(":");
          rememberAppLocation("AI search result");
          pushCurrentNavigation("AI search result");
          if (!await setMode(mode, { keepNavigation: true, keepAiResult: true, skipAppHistory: true })) return;
          if (kind === "color_group") await loadColorGroup(Number(id), { skipAppHistory: true });
          else await loadDetail(Number(id), { skipAppHistory: true });
        });
      }
    }

    async function loadList() {
      const requestId = ++state.requestId;
      const query = encodeURIComponent($("searchInput").value.trim());
      const params = new URLSearchParams();
      if (query) params.set("q", $("searchInput").value.trim());
      for (const [key, values] of Object.entries(state.filters[state.mode] || {})) {
        for (const value of values || []) {
          params.append(`f_${key}`, value);
        }
      }
      const suffix = params.toString() ? `?${params.toString()}` : "";
      const url = state.mode === "products"
        ? `/api/products${suffix}`
        : state.mode === "colors"
          ? `/api/color-groups`
          : state.mode === "corrections"
            ? `/api/notes`
            : `/api/systems${suffix}`;
      const data = await api(url);
      if (requestId !== state.requestId) return;
      state.items = state.mode === "colors"
        ? (data.items || []).filter((item) => !query || `${item.name} ${item.description || ""}`.toLowerCase().includes(decodeURIComponent(query).toLowerCase()))
        : data.items || [];
      state.filterDefs = data.filters || [];
      if (state.mode !== "corrections") await refreshNotesIndex();
      renderFilterOptions();
      if (state.mode === "corrections") {
        state.detailView = "list";
        renderNotesList();
        renderNotesOverview();
      } else if (state.mode === "colors") {
        renderList();
        state.detailView = "list";
        await renderColorOverview();
      } else {
        state.detailView = "list";
        renderFilters();
        renderResults();
      }
    }

    function renderFilterOptions() {
      const current = $("categorySelect").value;
      if (state.mode === "colors") {
        $("categorySelect").innerHTML = `
          <option value="">All visual attributes in group</option>
          <option value="simple">Simple</option>
          <option value="advanced">Advanced</option>
        `;
      }
      $("categorySelect").value = current;
    }

    function renderFilters() {
      const filters = state.filterDefs || [];
      const selected = state.filters[state.mode] || {};
      $("list").innerHTML = `
        <div class="filters">
          <button class="clear-filters" type="button" data-clear-filters>Clear filters</button>
          ${filters.map((filter) => `
            <div class="filter-group">
              <div class="filter-title">${esc(filter.label)}</div>
              ${filter.type === "single" ? singleFilter(filter, selected[filter.id] || []) : multiFilter(filter, selected[filter.id] || [])}
            </div>
          `).join("") || `<div class="muted">No selection filters found in this dataset.</div>`}
        </div>
      `;
      const clearButton = document.querySelector("[data-clear-filters]");
      if (clearButton) {
        clearButton.addEventListener("click", () => {
          rememberAppLocation("Filters");
          state.filters[state.mode] = {};
          state.selectedId = null;
          loadList();
        });
      }
      for (const input of document.querySelectorAll("[data-filter-id]")) {
        input.addEventListener("change", () => updateFilter(input));
      }
    }

    function singleFilter(filter, selected) {
      const current = selected[0] || "";
      return `<select data-filter-id="${esc(filter.id)}" data-filter-type="single">
        <option value="">Any</option>
        ${(filter.values || []).map((item) => `<option value="${esc(item.value)}"${item.value === current ? " selected" : ""}>${esc(item.label || item.value)} (${esc(item.count)})</option>`).join("")}
      </select>`;
    }

    function multiFilter(filter, selected) {
      const current = new Set(selected || []);
      return (filter.values || []).map((item) => `
        <label class="filter-option">
          <input type="checkbox" data-filter-id="${esc(filter.id)}" data-filter-type="multi" value="${esc(item.value)}"${current.has(item.value) ? " checked" : ""}>
          <span>${esc(item.label || item.value)} <span class="filter-count">(${esc(item.count)})</span></span>
        </label>
      `).join("");
    }

    function updateFilter(input) {
      rememberAppLocation("Filters");
      const modeFilters = state.filters[state.mode] || {};
      const id = input.dataset.filterId;
      if (input.dataset.filterType === "single") {
        modeFilters[id] = input.value ? [input.value] : [];
      } else {
        modeFilters[id] = [...document.querySelectorAll("[data-filter-id]:checked")]
          .filter((item) => item.dataset.filterId === id)
          .map((item) => item.value);
      }
      if (!modeFilters[id].length) delete modeFilters[id];
      state.filters[state.mode] = modeFilters;
      state.selectedId = null;
      loadList();
    }

    function renderResults() {
      const label = state.mode === "products" ? "products" : "building elements";
      $("detail").innerHTML = `
        ${startupWarning()}
        <div class="results-head">
          <h2>${state.items.length} ${label}</h2>
          <div class="results-actions">
            <button type="button" data-view-mode="grid"${state.view === "grid" ? " disabled" : ""}>Tiles</button>
            <button type="button" data-view-mode="list"${state.view === "list" ? " disabled" : ""}>List</button>
            <button type="button" data-bulk-accept="true">Accept selected</button>
            <button type="button" data-bulk-accept="false">Mark selected not accepted</button>
          </div>
        </div>
        ${state.view === "list" ? resultsList(label) : resultsGrid()}
      `;
      for (const button of document.querySelectorAll("[data-view-mode]")) {
        button.addEventListener("click", () => {
          state.view = button.dataset.viewMode;
          renderResults();
        });
      }
      for (const button of document.querySelectorAll("[data-bulk-accept]")) {
        button.addEventListener("click", () => bulkAcceptSelected(button.dataset.bulkAccept === "true"));
      }
      for (const button of document.querySelectorAll("[data-result-id]")) {
        button.addEventListener("click", () => loadDetail(Number(button.dataset.resultId)));
      }
      for (const input of document.querySelectorAll("[data-select-record]")) {
        input.addEventListener("click", (event) => event.stopPropagation());
        input.addEventListener("change", () => {
          const id = String(input.dataset.selectRecord);
          if (input.checked) state.selectedRecords.add(id);
          else state.selectedRecords.delete(id);
          renderResults();
        });
      }
    }

    function resultsGrid() {
      return `<div class="results-grid">
        ${state.items.map((item) => {
          const note = noteForItem(item);
          const selected = state.selectedRecords.has(String(item.id));
          return `<button class="result-card${selected ? " selected" : ""}" type="button" data-result-id="${esc(item.id)}">
            <input class="result-select" type="checkbox" data-select-record="${esc(item.id)}"${selected ? " checked" : ""}>
            ${item.thumbnail ? `<img src="${esc(item.thumbnail)}" alt="${esc(item.name)}">` : `<span class="result-placeholder">${state.mode === "products" ? "P" : "S"}</span>`}
            <span class="result-title">${esc(item.name)}</span>
            ${item.ownership ? `<span class="status-pill">${esc(item.ownership.label)}</span>` : ""}
            ${acceptancePill(note)}
          </button>`;
        }).join("") || `<div class="muted">No results.</div>`}
      </div>`;
    }

    function resultsList(label) {
      return `<div class="data-table">
        <table>
          <thead><tr><th></th><th>Name</th><th>Status</th><th>Preview fields</th></tr></thead>
          <tbody>${state.items.map((item) => {
            const note = noteForItem(item);
            const selected = state.selectedRecords.has(String(item.id));
            const fields = (item.preview_fields || []).map((field) => `<strong>${esc(field.label)}:</strong> ${esc(field.value)}`).join("<br>");
            return `<tr>
              <td><input type="checkbox" data-select-record="${esc(item.id)}"${selected ? " checked" : ""}></td>
              <td><button type="button" data-result-id="${esc(item.id)}">${esc(item.name)}</button><br><span class="muted">ID: ${esc(item.id)}${item.ownership ? ` / ${esc(item.ownership.label)}` : ""}</span></td>
              <td>${acceptancePill(note)}</td>
              <td>${fields || `<span class="muted">No preview fields.</span>`}</td>
            </tr>`;
          }).join("") || `<tr><td colspan="4" class="muted">No ${esc(label)}.</td></tr>`}</tbody>
        </table>
      </div>`;
    }

    function acceptancePill(note) {
      return note.accepted
        ? `<span class="status-pill status-accepted">Accepted</span>`
        : `<span class="status-pill status-not-accepted">Not accepted</span>`;
    }

    async function bulkAcceptSelected(accepted) {
      const records = state.items
        .filter((item) => state.selectedRecords.has(String(item.id)))
        .map((item) => ({ id: item.id, name: item.name }));
      if (!records.length) return;
      await apiPost("/api/records/accept", { record_type: recordTypeForMode(), accepted, records });
      state.selectedRecords = new Set();
      await refreshNotesIndex();
      await refreshProjectProgress();
      if (state.mode === "colors") renderList();
      else renderResults();
    }

    function startupWarning() {
      const consistency = state.summary?.consistency || {};
      if (!consistency.products_without_building_element && !consistency.building_element_product_ids_missing_in_products) return "";
      const sample = (consistency.products_without_building_element_sample || [])
        .map((item) => `${item.name} (ID ${item.id})`)
        .join(", ");
      const missing = (consistency.missing_product_id_sample || []).join(", ");
      return `<div class="startup-warning">
        ${consistency.products_without_building_element ? `<strong>${esc(consistency.products_without_building_element)} products are not used in building elements.</strong>` : ""}
        ${sample ? `<div>Examples: ${esc(sample)}</div>` : ""}
        ${consistency.building_element_product_ids_missing_in_products ? `<div><strong>${esc(consistency.building_element_product_ids_missing_in_products)} product IDs used in building elements do not exist in Products.</strong> ${esc(missing)}</div>` : ""}
      </div>`;
    }

    function renderNotesList() {
      $("list").innerHTML = state.items.map((item) => `
        <button class="item${item.key === state.selectedId ? " active" : ""}" type="button" data-note-key="${esc(item.key)}">
          <span class="item-title">${esc(item.record_name || item.key)}</span>
          <span class="item-meta">
            <span>${esc(item.record_type)}</span>
            <span>ID: ${esc(item.record_id)}</span>
            ${item.field_label ? `<span>field: ${esc(item.field_label)}</span>` : ""}
            ${item.requires_correction ? "<span>requires correction</span>" : ""}
            ${item.field_label ? "" : item.accepted ? "<span>accepted</span>" : "<span>not accepted</span>"}
            ${item.resolved ? "<span>resolved</span>" : ""}
          </span>
        </button>
      `).join("") || `<div class="item"><span class="muted">No corrections saved.</span></div>`;
      for (const button of document.querySelectorAll("[data-note-key]")) {
        button.addEventListener("click", () => openNote(button.dataset.noteKey));
      }
    }

    function renderNotesOverview() {
      state.detailView = "list";
      const openCount = state.items.filter((item) => !item.resolved).length;
      const resolvedCount = state.items.length - openCount;
      $("detail").innerHTML = `
        <div class="detail-head">
          <h2>Corrections</h2>
          <div class="summary">
            <span class="pill">${esc(state.items.length)} saved notes</span>
            <span class="pill">${esc(openCount)} open</span>
            <span class="pill">${esc(resolvedCount)} resolved</span>
          </div>
          <div class="preview-actions">
            <button type="button" data-export-notes>Export JSON</button>
            <button type="button" data-export-notes-csv>Export Excel CSV</button>
            <input id="notesImportInput" type="file" accept=".json" hidden>
            <button type="button" data-import-notes>Import notes</button>
          </div>
          <div id="notesImportStatus" class="muted"></div>
        </div>
        <div class="data-table">
          <table>
            <thead><tr><th>Record</th><th>Field</th><th>Type</th><th>Status</th><th>Needs correction</th><th>Comment</th></tr></thead>
            <tbody>${state.items.map((item) => `
              <tr>
                <td><button type="button" data-open-note="${esc(item.key)}">${esc(item.record_name || item.key)}</button><br><span class="muted">ID: ${esc(item.record_id)}</span></td>
                <td>${item.field_label ? esc(item.field_label) : `<span class="muted">General</span>`}</td>
                <td>${esc(item.record_type)}</td>
                <td>${item.resolved ? "Resolved" : "Open"}</td>
                <td>${item.requires_correction ? "Yes" : "No"}</td>
                <td>${esc(item.comment || "")}</td>
              </tr>
            `).join("") || `<tr><td colspan="6" class="muted">No corrections saved.</td></tr>`}</tbody>
          </table>
        </div>
      `;
      for (const button of document.querySelectorAll("[data-open-note]")) {
        button.addEventListener("click", () => openNote(button.dataset.openNote));
      }
      const exportButton = document.querySelector("[data-export-notes]");
      if (exportButton) exportButton.addEventListener("click", () => { window.location.href = "/api/notes/export"; });
      const exportCsvButton = document.querySelector("[data-export-notes-csv]");
      if (exportCsvButton) exportCsvButton.addEventListener("click", () => { window.location.href = "/api/notes/export.csv"; });
      const importButton = document.querySelector("[data-import-notes]");
      if (importButton) importButton.addEventListener("click", () => $("notesImportInput").click());
      const importInput = $("notesImportInput");
      if (importInput) importInput.addEventListener("change", importNotesFile);
    }

    function openNote(key, options = {}) {
      if (!options.skipAppHistory) rememberAppLocation();
      state.detailView = "note";
      state.selectedId = key;
      renderNotesList();
      const note = state.items.find((item) => item.key === key);
      if (!note) return;
      $("detail").innerHTML = `
        ${navigationBackControl()}
        <div class="detail-head">
          <h2>${esc(note.record_name || note.key)}</h2>
          <div class="summary">
            <span class="pill">${esc(note.record_type)}</span>
            <span class="pill">ID: ${esc(note.record_id)}</span>
            ${note.field_label ? `<span class="pill">Field: ${esc(note.field_label)}</span>` : ""}
            ${note.field_label ? "" : note.accepted ? `<span class="pill status-accepted">Accepted</span>` : `<span class="pill status-not-accepted">Not accepted</span>`}
            ${note.requires_correction ? `<span class="pill warn">Requires correction</span>` : ""}
            ${note.resolved ? `<span class="pill">Resolved</span>` : `<span class="pill warn">Open</span>`}
          </div>
        </div>
        <div class="field-value">${esc(note.comment || "")}</div>
        <div class="preview-actions">
          <button type="button" data-open-record="${esc(note.record_type)}:${esc(note.record_id)}">Open record</button>
          <button type="button" data-toggle-note-resolved="${esc(note.key)}">${note.resolved ? "Mark as open" : "Mark as resolved"}</button>
        </div>
      `;
      const button = document.querySelector("[data-open-record]");
      if (button) {
        button.addEventListener("click", async () => {
          const [type, id] = button.dataset.openRecord.split(":");
          pushCurrentNavigation("Corrections");
          if (!await setMode(type === "system" ? "systems" : type === "color" || type === "color_group" ? "colors" : "products", { keepNavigation: true, skipAppHistory: true })) return;
          if (type === "color_group") await loadColorGroup(Number(id), { skipAppHistory: true });
          else await loadDetail(Number(id), { skipAppHistory: true });
        });
      }
      const resolvedButton = document.querySelector("[data-toggle-note-resolved]");
      if (resolvedButton) {
        resolvedButton.addEventListener("click", async () => {
          await apiPost("/api/notes", { ...note, resolved: !note.resolved });
          await refreshProjectProgress();
          await loadList();
        });
      }
      attachNavigationControls();
    }

    async function importNotesFile() {
      const input = $("notesImportInput");
      if (!input.files.length) return;
      const text = await input.files[0].text();
      const payload = JSON.parse(text);
      const result = await apiPost("/api/notes/import", payload);
      $("notesImportStatus").textContent = `Imported ${result.imported} notes. Total: ${result.total}.`;
      input.value = "";
      await refreshProjectProgress();
      await loadList();
    }

    async function renderColorOverview() {
      state.selectedId = null;
      const kind = $("categorySelect").value || "";
      const query = $("searchInput").value.trim();
      const params = new URLSearchParams();
      if (kind) params.set("kind", kind);
      if (query) params.set("q", query);
      const data = await api(`/api/colors${params.toString() ? `?${params.toString()}` : ""}`);
      const colorItems = data.items || [];
      const colorsWithRgb = colorItems.filter((item) => item.rgb);
      const matches = state.rgbSelection ? colorsWithRgb.filter(colorMatchesColorSelection) : [];
      const hasSearch = Boolean(query || kind);
      const visibleColors = state.rgbSelection ? matches : hasSearch ? colorItems : [];
      state.rgbMatches = matches;
      $("detail").innerHTML = `
        <div class="detail-head">
          <h2>Visual Attributes</h2>
          <div class="summary">
            <span class="pill">${esc(state.items.length)} groups</span>
            ${hasSearch ? `<span class="pill">${esc(colorItems.length)} keyword matches</span>` : ""}
            <span class="pill">${esc(colorsWithRgb.length)} visual attributes with RGB${hasSearch ? " in current search" : ""}</span>
            ${state.rgbSelection ? `<span class="pill">${esc(matches.length)} ${esc(state.colorSearchModel.toUpperCase())} matches</span>` : ""}
          </div>
        </div>
        ${rgbSearchPanel(colorsWithRgb.length, matches.length)}
        ${visibleColors.length || hasSearch || state.rgbSelection ? renderColorSearchMatches(visibleColors, state.rgbSelection ? `${state.colorSearchModel.toUpperCase()} range matches` : "Keyword matches") : `<div class="muted">Select a visual attribute group on the left, type a keyword, or draw a color range above to show matching colors and textures.</div>`}
      `;
      attachRgbSearchEvents();
      attachColorTileEvents();
    }

    function rgbSearchPanel(total, matched) {
      const selection = colorSelectionRange();
      return `<div class="rgb-search-panel">
        <strong>Color range search</strong>
        <div class="muted">Active color model: ${esc(colorModelName())}</div>
        <div class="results-actions">
          <button class="${state.colorSearchModel === "rgb" ? "active-model" : ""}" type="button" data-color-model="rgb"${state.colorSearchModel === "rgb" ? " disabled" : ""}>RGB</button>
          <button class="${state.colorSearchModel === "hsb" ? "active-model" : ""}" type="button" data-color-model="hsb"${state.colorSearchModel === "hsb" ? " disabled" : ""}>HSB</button>
        </div>
        <div class="rgb-search-layout">
          <div>
            <div class="rgb-map-wrap">
              <canvas id="rgbMapCanvas" width="512" height="512"></canvas>
              ${rgbSelectionBox()}
            </div>
            <div class="rgb-map-caption">${esc(colorMapCaption())}</div>
          </div>
          <div class="rgb-controls">
            ${state.colorSearchModel === "hsb" ? hsbControls() : rgbControls()}
            <div class="rgb-readout">
              <div>RGB records available: ${esc(total)}</div>
              <div>${state.rgbSelection ? `Matches: ${esc(matched)}` : colorSelectionHelp()}</div>
              <div>${colorSelectionLabel(selection)}</div>
            </div>
            <div class="preview-actions">
              <button type="button" data-clear-rgb-selection${state.rgbSelection ? "" : " disabled"}>Clear color range</button>
            </div>
          </div>
        </div>
      </div>`;
    }

    function colorModelName() {
      return state.colorSearchModel === "hsb" ? "HSB / Hue, Saturation, Brightness" : "RGB / Red, Green, Blue";
    }

    function colorMapCaption() {
      return state.colorSearchModel === "hsb"
        ? "Map axes: horizontal Hue, vertical Saturation. Brightness is set by sliders."
        : "Map axes: horizontal Red, vertical Green. Blue is set by sliders.";
    }

    function rgbControls() {
      return [
        rgbRangeControl("R min", "rMin"),
        rgbRangeControl("R max", "rMax"),
        rgbRangeControl("G min", "gMin"),
        rgbRangeControl("G max", "gMax"),
        rgbRangeControl("B min", "bMin"),
        rgbRangeControl("B max", "bMax"),
      ].join("");
    }

    function hsbControls() {
      return [
        hsbRangeControl("Hue min", "hMin", 360),
        hsbRangeControl("Hue max", "hMax", 360),
        hsbRangeControl("Saturation min", "sMin", 100),
        hsbRangeControl("Saturation max", "sMax", 100),
        hsbRangeControl("Brightness min", "vMin", 100),
        hsbRangeControl("Brightness max", "vMax", 100),
      ].join("");
    }

    function rgbRangeControl(label, key) {
      return `<label>${esc(label)}: ${esc(state.rgbRange[key])}
        <input data-rgb-range="${esc(key)}" type="range" min="0" max="255" value="${esc(state.rgbRange[key])}">
      </label>`;
    }

    function hsbRangeControl(label, key, max) {
      return `<label>${esc(label)}: ${esc(state.hsbRange[key])}
        <input data-hsb-range="${esc(key)}" type="range" min="0" max="${esc(max)}" value="${esc(state.hsbRange[key])}">
      </label>`;
    }

    function colorSelectionHelp() {
      return state.colorSearchModel === "hsb"
        ? "Draw a rectangle on the map to set Hue/Saturation range, then adjust Brightness below."
        : "Draw a rectangle on the map to set R/G range, then adjust any RGB component below.";
    }

    function colorSelectionLabel(selection) {
      if (state.colorSearchModel === "hsb") {
        return `H ${selection.hMin}-${selection.hMax}, S ${selection.sMin}-${selection.sMax}, B ${selection.vMin}-${selection.vMax}`;
      }
      return `R ${selection.rMin}-${selection.rMax}, G ${selection.gMin}-${selection.gMax}, B ${selection.bMin}-${selection.bMax}`;
    }

    function rgbSelectionBox() {
      if (!state.rgbSelection) return "";
      const rect = normalizedRgbRect();
      return `<div class="rgb-selection-box" style="left:${rect.xMin / 255 * 100}%;top:${rect.yMin / 255 * 100}%;width:${(rect.xMax - rect.xMin) / 255 * 100}%;height:${(rect.yMax - rect.yMin) / 255 * 100}%;"></div>`;
    }

    function normalizedRgbRect() {
      const selection = state.rgbSelection || { x1: 0, y1: 0, x2: 0, y2: 0 };
      return {
        xMin: Math.min(selection.x1, selection.x2),
        xMax: Math.max(selection.x1, selection.x2),
        yMin: Math.min(selection.y1, selection.y2),
        yMax: Math.max(selection.y1, selection.y2),
      };
    }

    function colorSelectionRange() {
      if (state.colorSearchModel === "hsb") return hsbSelectionRange();
      return rgbSelectionRange();
    }

    function rgbSelectionRange() {
      return {
        rMin: Math.min(Number(state.rgbRange.rMin), Number(state.rgbRange.rMax)),
        rMax: Math.max(Number(state.rgbRange.rMin), Number(state.rgbRange.rMax)),
        gMin: Math.min(Number(state.rgbRange.gMin), Number(state.rgbRange.gMax)),
        gMax: Math.max(Number(state.rgbRange.gMin), Number(state.rgbRange.gMax)),
        bMin: Math.min(Number(state.rgbRange.bMin), Number(state.rgbRange.bMax)),
        bMax: Math.max(Number(state.rgbRange.bMin), Number(state.rgbRange.bMax)),
      };
    }

    function hsbSelectionRange() {
      return {
        hMin: Math.min(Number(state.hsbRange.hMin), Number(state.hsbRange.hMax)),
        hMax: Math.max(Number(state.hsbRange.hMin), Number(state.hsbRange.hMax)),
        sMin: Math.min(Number(state.hsbRange.sMin), Number(state.hsbRange.sMax)),
        sMax: Math.max(Number(state.hsbRange.sMin), Number(state.hsbRange.sMax)),
        vMin: Math.min(Number(state.hsbRange.vMin), Number(state.hsbRange.vMax)),
        vMax: Math.max(Number(state.hsbRange.vMin), Number(state.hsbRange.vMax)),
      };
    }

    function colorMatchesColorSelection(item) {
      return state.colorSearchModel === "hsb" ? colorMatchesHsbSelection(item) : colorMatchesRgbSelection(item);
    }

    function colorMatchesRgbSelection(item) {
      const rgb = item.rgb || {};
      const range = rgbSelectionRange();
      if (!range) return false;
      const r = Number(rgb.r);
      const g = Number(rgb.g);
      const b = Number(rgb.b);
      return Number.isFinite(r) && Number.isFinite(g) && Number.isFinite(b)
        && r >= range.rMin && r <= range.rMax
        && g >= range.gMin && g <= range.gMax
        && b >= range.bMin && b <= range.bMax;
    }

    function colorMatchesHsbSelection(item) {
      const hsb = rgbToHsb(item.rgb || {});
      const range = hsbSelectionRange();
      if (!hsb) return false;
      return hsb.h >= range.hMin && hsb.h <= range.hMax
        && hsb.s >= range.sMin && hsb.s <= range.sMax
        && hsb.v >= range.vMin && hsb.v <= range.vMax;
    }

    function renderColorSearchMatches(items, title) {
      return `<details open>
        <summary>${esc(title)} (${items.length})</summary>
