services:
  db-data-browser:
    build: .
    ports:
      - "8788:8788"
    environment:
      DB_DATA_BROWSER_AI_URL: ${DB_DATA_BROWSER_AI_URL:-}
      DB_DATA_BROWSER_AI_MODEL: ${DB_DATA_BROWSER_AI_MODEL:-qwen2.5-coder:14b}
    volumes:
      - pim-data:/data
    restart: unless-stopped

volumes:
  pim-data:
